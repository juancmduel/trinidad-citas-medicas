# ================================================================
#  Trinidad Citas Medicas - Configuracion Principal
#  Base de datos: SQL Server
#
#  ANTES DE LEVANTAR EL PROYECTO ejecutar en SSMS:
#    1. CREATE DATABASE clinica_trinidad;
#    2. Ejecutar db/sqlserver/01_schema.sql
#    3. Ejecutar db/sqlserver/02_seed.sql
#
#  Para Oracle: cambiar a spring.profiles.active=oracle,api,web
#  Para H2 (dev): cambiar a spring.profiles.active=dev,api,web
# ================================================================

spring.application.name=trinidad-citas-medicas
# Perfiles activos por defecto: sqlserver (BD) + api (REST) + web (Thymeleaf)
# NOTA: Los @Profile en controllers usan "api" o "web" (no "default").
# Si se ejecuta sin profiles activos, solo cargan beans sin @Profile o con "default".
spring.profiles.active=sqlserver,api,web
server.port=8081
server.servlet.context-path=/trinidad

# ── Base de Datos ────────────────────────────────────────────────
# ⚠ La configuracion de datasource se define en cada perfil:
#    - application-sqlserver.properties (activo por defecto)
#    - application-oracle.properties
#    - application-dev.properties (H2)
# Valores por defecto (Oracle, por compatibilidad):
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=TRINIDAD_DB
spring.datasource.password=Trinidad2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ──────────────────────────────────────────────
# ⚠ Cada perfil define su propio dialecto JPA segun la BD.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never

# ── Fechas ───────────────────────────────────────────────────────
# Formato ISO para fechas (yyyy-MM-dd) y fechas con hora (ISO-8601)
spring.mvc.format.date=iso
spring.mvc.format.date-time=iso

# ── Thymeleaf ────────────────────────────────────────────────────
# En desarrollo no usamos caché para ver los cambios en vivo.
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ── DevTools ─────────────────────────────────────────────────────
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ── CORS ──────────────────────────────────────────────────────────
# ¿Desde qué dominios se puede llamar a la API?
# Vacío = solo desde el mismo servidor (restringido).
# Si tienes un frontend aparte, ponlo aquí: https://miapp.com,https://admin.miapp.com
# Se puede definir también como variable de entorno CORS_ALLOWED_ORIGINS
trinidad.cors.allowed-origins=

# ── Seed Data ────────────────────────────────────────────────────
# Contraseña para los usuarios que se crean automáticamente al arrancar
# (admin, gerente, dr.garcia, paciente1, etc.).
# En producción, DEFINIR como variable de entorno TRINIDAD_SEED_USER_PASSWORD
# Valor por defecto SOLO para desarrollo local, NUNCA en producción.
trinidad.seed.user-password=${TRINIDAD_SEED_USER_PASSWORD:Trinidad2026}

# ── JWT ──────────────────────────────────────────────────────────
# Clave secreta para firmar los tokens JWT (variable de entorno).
# Para generar una: openssl rand -base64 32
trinidad.jwt.secret=${JWT_SECRET:CAMBIAR_ESTA_CLAVE_MUY_LARGA_Y_SEGURA_EN_PROD_2026_TRINIDAD_MEDICINAS_SA}
# El token de acceso dura 1 hora (3600000 ms)
trinidad.jwt.expiration-ms=3600000
# El token de refresh dura 24 horas (86400000 ms)
trinidad.jwt.refresh-ms=86400000

# ── Archivos adjuntos ────────────────────────────────────────────
# Tamaño máximo para archivos que se suben al sistema (recetas, exámenes, etc.)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Correo Gmail SMTP ────────────────────────────────────────────
# Las credenciales se toman de variables de entorno (MAIL_USERNAME, MAIL_PASSWORD).
# NUNCA pongas el usuario y contraseña directamente aquí.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Logging ──────────────────────────────────────────────────────
# ⚠ En producción, NO mostrar SQL ni bind parameters (datos sensibles)
logging.level.root=INFO
logging.level.com.trinidad=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.file.name=logs/trinidad.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
