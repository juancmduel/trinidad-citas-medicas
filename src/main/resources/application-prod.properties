# ================================================================
#  PERFIL DE PRODUCCION - Trinidad Citas Medicas
#  Activar con: --spring.profiles.active=prod
#  Sobrescribe valores de application.properties para seguridad
# ================================================================

# ── JPA / Hibernate ──────────────────────────────────────────────
# Solo validar que el esquema coincide, NUNCA modificarlo
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Thymeleaf ────────────────────────────────────────────────────
# Cache activado para rendimiento en produccion
spring.thymeleaf.cache=true

# ── Logging ──────────────────────────────────────────────────────
# NO mostrar SQL ni datos sensibles en logs de produccion
logging.level.root=WARN
logging.level.com.trinidad=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ── DevTools (deshabilitados en produccion) ──────────────────────
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ── CORS - Produccion ────────────────────────────────────────────
# Configurar origenes permitidos desde variable de entorno
trinidad.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ── JWT - Produccion ─────────────────────────────────────────────
# Token mas corto para produccion (30 min en vez de 1h)
trinidad.jwt.expiration-ms=1800000
