<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Configurar Horario')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-calendar3"></i>
                    <span th:text="${horario.idHorario != null} ? 'Editar Horario' : 'Nuevo Horario'">Horario</span>
                </h1>
                <p>Configuración de horario de atención médica</p>
            </div>
            <a th:href="@{/horarios}" class="btn-volver">
                <i class="bi bi-arrow-left"></i>Volver
            </a>
        </div>

        <form th:action="@{/horarios/guardar}" method="post">

            <div class="row g-4">
                <div class="col-lg-8">

                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-person-badge-fill"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Médico y Día</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Asignación del horario</p>
                            </div>
                        </div>
                        <input type="hidden" name="idHorario" th:value="${horario.idHorario}">
                        <div class="row g-3">
                            <div class="col-md-6 form-field">
                                <label>Médico <span class="required">*</span></label>
                                <select name="medicoId" class="form-select-professional" required>
                                    <option value="">— Seleccionar médico —</option>
                                    <option th:each="m : ${medicos}"
                                            th:value="${m.idMedico}"
                                            th:text="${m.apellidoPaterno + ' ' + m.nombres}"
                                            th:selected="${horario.idMedico != null and horario.idMedico == m.idMedico}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6 form-field">
                                <label>Día de la Semana <span class="required">*</span></label>
                                <select name="diaSemana" class="form-select-professional" required>
                                    <option value="">— Seleccionar día —</option>
                                    <option value="1" th:selected="${horario.diaSemana == 1}">Lunes</option>
                                    <option value="2" th:selected="${horario.diaSemana == 2}">Martes</option>
                                    <option value="3" th:selected="${horario.diaSemana == 3}">Miércoles</option>
                                    <option value="4" th:selected="${horario.diaSemana == 4}">Jueves</option>
                                    <option value="5" th:selected="${horario.diaSemana == 5}">Viernes</option>
                                    <option value="6" th:selected="${horario.diaSemana == 6}">Sábado</option>
                                    <option value="7" th:selected="${horario.diaSemana == 7}">Domingo</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-clock-fill"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Horario de Atención</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Horas de inicio y fin del turno</p>
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6 form-field">
                                <label>Hora Inicio <span class="required">*</span></label>
                                <div class="date-input-wrapper">
                                    <i class="bi bi-sun date-input-icon"></i>
                                    <input type="time" name="horaInicio" class="form-input-professional"
                                           th:value="${horario.horaInicio}" required>
                                </div>
                            </div>
                            <div class="col-md-6 form-field">
                                <label>Hora Fin <span class="required">*</span></label>
                                <div class="date-input-wrapper">
                                    <i class="bi bi-moon date-input-icon"></i>
                                    <input type="time" name="horaFin" class="form-input-professional"
                                           th:value="${horario.horaFin}" required>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-toggle-on"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Estado</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Disponibilidad del horario</p>
                            </div>
                        </div>
                        <div class="status-toggle-group">
                            <label class="status-option" th:classappend="${horario.activo == 1 or horario.activo == null} ? 'selected-active' : ''">
                                <input type="radio" name="activo" value="1" th:checked="${horario.activo == 1 or horario.activo == null}">
                                <i class="bi bi-check-circle-fill"></i><span>Activo</span>
                            </label>
                            <label class="status-option" th:classappend="${horario.activo == 0} ? 'selected-inactive' : ''">
                                <input type="radio" name="activo" value="0" th:checked="${horario.activo == 0}">
                                <i class="bi bi-x-circle-fill"></i><span>Inactivo</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-lightning-fill"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Acciones</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Finaliza o descarta cambios</p>
                            </div>
                        </div>
                        <button type="submit" class="btn-guardar w-100 mb-2" style="justify-content:center;padding:12px;">
                            <i class="bi bi-check-circle me-2"></i>
                            <span th:text="${horario.idHorario != null} ? 'Guardar Cambios' : 'Crear Horario'"></span>
                        </button>
                        <a th:href="@{/horarios}" class="btn-volver w-100 text-center" style="justify-content:center;padding:12px;">
                            <i class="bi bi-x-circle me-2"></i>Cancelar
                        </a>
                    </div>

                </div>
            </div>

        </form>

    </main>
</div>
</body>
</html>
