<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Configurar Horario')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="container-xl">
            <div class="page-header">
                <h2 class="page-title">
                    <i class="fa-solid fa-calendar"></i>
                    <span th:text="${horario.idHorario != null} ? 'Editar Horario' : 'Nuevo Horario'">Configurar Horario</span>
                </h2>
            </div>
        </div>
        <div class="page-wrapper">
            <div class="container-xl">
                <div class="row">
                    <div class="col-md-6 offset-md-3">
                        <div class="card">
                            <div class="card-body">
                                <form th:action="@{/horarios/guardar}" method="post">
                                    <input type="hidden" name="idHorario" th:value="${horario.idHorario}">

                                    <div class="form-field">
                                        <label>Médico <span class="required">*</span></label>
                                        <select name="medicoId" class="form-control" required>
                                            <option value="">-- Seleccionar médico --</option>
                                            <option th:each="m : ${medicos}"
                                                    th:value="${m.idMedico}"
                                                    th:text="${m.apellidoPaterno + ' ' + m.nombres}"
                                                    th:selected="${horario.medico != null and horario.medico.idMedico == m.idMedico}">
                                            </option>
                                        </select>
                                    </div>

                                    <div class="form-field">
                                        <label>Día de la Semana <span class="required">*</span></label>
                                        <select name="diaSemana" class="form-control" required>
                                            <option value="">-- Seleccionar día --</option>
                                            <option value="1" th:selected="${horario.diaSemana == 1}">Lunes</option>
                                            <option value="2" th:selected="${horario.diaSemana == 2}">Martes</option>
                                            <option value="3" th:selected="${horario.diaSemana == 3}">Miércoles</option>
                                            <option value="4" th:selected="${horario.diaSemana == 4}">Jueves</option>
                                            <option value="5" th:selected="${horario.diaSemana == 5}">Viernes</option>
                                            <option value="6" th:selected="${horario.diaSemana == 6}">Sábado</option>
                                            <option value="7" th:selected="${horario.diaSemana == 7}">Domingo</option>
                                        </select>
                                    </div>

                                    <div class="form-field">
                                        <label>Hora Inicio <span class="required">*</span></label>
                                        <input type="time" name="horaInicio" class="form-control"
                                               th:value="${horario.horaInicio}" required>
                                    </div>

                                    <div class="form-field">
                                        <label>Hora Fin <span class="required">*</span></label>
                                        <input type="time" name="horaFin" class="form-control"
                                               th:value="${horario.horaFin}" required>
                                    </div>

                                    <div class="form-field">
                                        <label>Estado</label>
                                        <select name="activo" class="form-control">
                                            <option value="1" th:selected="${horario.activo == null or horario.activo == 1}">Activo</option>
                                            <option value="0" th:selected="${horario.activo == 0}">Inactivo</option>
                                        </select>
                                    </div>

                                    <div class="form-footer d-flex gap-2 justify-content-end mt-3">
                                        <a th:href="@{/horarios}" class="btn btn-ghost">Cancelar</a>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fa-solid fa-save"></i> Guardar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
