<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Horario')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-calendar3"></i>Detalle del Horario</h1>
                <p>Información completa del horario médico</p>
            </div>
            <span class="badge-estado-lg" th:classappend="${horario.activo == 1} ? 'badge-activo' : 'badge-inactivo'"
                  th:text="${horario.activo == 1} ? 'Activo' : 'Inactivo'"></span>
        </div>

        <div th:if="${horario != null}" class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-clock"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Información del Horario</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Médico</span>
                                    <span class="df-value df-value-accent" th:text="${horario.medicoNombreCompleto ?: '-'}">-</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="detail-field">
                                    <span class="df-label">Día</span>
                                    <span class="df-value" th:text="${horario.diaSemanaDescripcion}">-</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="detail-field">
                                    <span class="df-label">Hora Inicio</span>
                                    <span class="df-value" th:text="${horario.horaInicio}">-</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="detail-field">
                                    <span class="df-label">Hora Fin</span>
                                    <span class="df-value" th:text="${horario.horaFin}">-</span>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="detail-field">
                                    <span class="df-label">Estado</span>
                                    <span class="badge-estado" th:classappend="${horario.activo == 1} ? 'badge-activo' : 'badge-inactivo'"
                                          th:text="${horario.activo == 1} ? 'Activo' : 'Inactivo'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="detail-actions">
                    <a th:href="@{/horarios/editar/{id}(id=${horario.idHorario})}" class="action-btn w-100">
                        <i class="bi bi-pencil"></i>Editar Horario
                    </a>
                    <form th:action="@{/horarios/eliminar/{id}(id=${horario.idHorario})}" method="post" style="display:block;" onsubmit="return confirm('¿Eliminar este horario?')">
                        <button type="submit" class="action-btn btn-danger-outline w-100" style="padding:12px;border-radius:10px;font-weight:600;">
                            <i class="bi bi-trash3"></i>Eliminar
                        </button>
                    </form>
                    <a th:href="@{/horarios}" class="btn-volver w-100 text-center" style="justify-content:center;padding:12px;">
                        <i class="bi bi-arrow-left"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
