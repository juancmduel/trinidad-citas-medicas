<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-clipboard2-pulse me-2" style="color:#06b6d4;"></i>Detalle de Atención
            </h1>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;">Información completa de la atención médica</p>
        </div>

        <div th:if="${atencion != null}">
            <!-- Datos principales -->
            <div class="card-professional mb-4">
                <div class="card-header-professional">
                    <h5><i class="bi bi-person-vcard"></i> Datos de la Consulta</h5>
                </div>
                <div class="p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Paciente</label>
                            <p th:text="${atencion.cita.paciente.apellidoPaterno + ' ' + atencion.cita.paciente.nombres}"></p>
                        </div>
                        <div class="col-md-4">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Médico</label>
                            <p th:text="${atencion.medico.apellidoPaterno + ' ' + atencion.medico.nombres}"></p>
                        </div>
                        <div class="col-md-4">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Atención</label>
                            <p th:text="${#temporals.format(atencion.fechaAtencion, 'dd/MM/yyyy HH:mm')}"></p>
                        </div>
                        <div class="col-md-6" th:if="${atencion.motivoConsulta}">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Motivo de Consulta</label>
                            <p th:text="${atencion.motivoConsulta}"></p>
                        </div>
                        <div class="col-md-6" th:if="${atencion.diagnosticoDesc}">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Diagnóstico</label>
                            <p th:text="${atencion.diagnosticoDesc}"></p>
                        </div>
                        <div class="col-12" th:if="${atencion.tratamiento}">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Tratamiento</label>
                            <p th:text="${atencion.tratamiento}"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Signos vitales -->
            <div class="card-professional mb-4">
                <div class="card-header-professional">
                    <h5><i class="bi bi-heart-pulse"></i> Signos Vitales</h5>
                </div>
                <div class="p-4">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Presión Arterial</label>
                            <p th:text="${atencion.presionArterial ?: '-'}"></p>
                        </div>
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Frecuencia Cardíaca</label>
                            <p th:text="${atencion.frecuenciaCardiaca != null ? atencion.frecuenciaCardiaca + ' lpm' : '-'}"></p>
                        </div>
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Temperatura</label>
                            <p th:text="${atencion.temperatura != null ? atencion.temperatura + ' °C' : '-'}"></p>
                        </div>
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Peso / Talla</label>
                            <p th:text="${(atencion.pesoKg != null ? atencion.pesoKg + ' kg' : '-') + ' / ' + (atencion.tallaCm != null ? atencion.tallaCm + ' cm' : '-')}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a href="/trinidad/atenciones" class="btn-ver">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
