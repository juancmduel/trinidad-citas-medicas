<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-clipboard2-pulse"></i>Atenciones médicas</h1>
                <p>Registro de atenciones realizadas a pacientes</p>
            </div>
        </div>
        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle"></i><span th:text="${ok}"></span>
        </div>
        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Fecha</th>
                        <th>Diagnóstico</th>
                        <th>Estado</th>
                        <th style="text-align:center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="atencion : ${atenciones}">
                        <td th:text="${atencion.idAtencion}"></td>
                        <td th:text="${atencion.cita.paciente.apellidoPaterno + ' ' + atencion.cita.paciente.nombres}"></td>
                        <td th:text="${atencion.medico.apellidoPaterno + ' ' + atencion.medico.nombres}"></td>
                        <td th:text="${#temporals.format(atencion.fechaAtencion, 'dd/MM/yyyy')}"></td>
                        <td th:text="${atencion.diagnosticoDesc}"></td>
                        <td>
                            <span class="badge-estado"
                                  th:classappend="${atencion.cita.estado == 'ATENDIDA'} ? 'badge-completado' : 'badge-proceso'"
                                  th:text="${atencion.cita.estado}"></span>
                        </td>
                        <td style="text-align:center;">
                            <div class="action-group">
                                <a th:href="@{/atenciones/{id}(id=${atencion.idAtencion})}" class="action-btn action-view" title="Ver"><i class="bi bi-eye"></i></a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(atenciones)}">
                        <td colspan="7" class="table-empty">No hay atenciones registradas</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
