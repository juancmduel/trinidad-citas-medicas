<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Rol')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-shield-lock"></i>Detalle del Rol</h1>
                <p>Información del rol de seguridad</p>
            </div>
            <span class="badge-estado badge-estado-lg" th:classappend="${rol.activo == 1} ? 'be-activo' : 'be-inactivo'"
                  th:text="${rol.activo == 1} ? 'Activo' : 'Inactivo'"></span>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-shield-fill"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Información del Rol</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Nombre</span>
                                    <span class="df-value df-value-accent" th:text="${rol.nombre}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Estado</span>
                                    <span class="df-value" th:text="${rol.activo == 1} ? 'Activo' : 'Inactivo'">-</span>
                                </div>
                            </div>
                            <div class="col-12" th:if="${rol.descripcion}">
                                <div class="detail-field">
                                    <span class="df-label">Descripción</span>
                                    <span class="df-value" th:text="${rol.descripcion}">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="detail-actions">
                    <a th:href="@{/roles/editar/{id}(id=${rol.idRol})}" class="action-btn w-100 mb-2">
                        <i class="bi bi-pencil"></i>Editar Rol
                    </a>
                    <form th:action="@{/roles/toggle/{id}(id=${rol.idRol})}" method="post" style="display:block;" onsubmit="return confirm('¿Cambiar estado?')">
                        <button type="submit" class="btn-volver w-100 mb-2" th:style="${rol.activo == 1} ? 'background:var(--warning);color:white;' : 'background:var(--success);color:white;'">
                            <i class="bi" th:classappend="${rol.activo == 1} ? 'bi-pause-fill' : 'bi-play-fill'"></i>
                            <span th:text="${rol.activo == 1} ? 'Desactivar' : 'Activar'"></span>
                        </button>
                    </form>
                    <form th:action="@{/roles/eliminar/{id}(id=${rol.idRol})}" method="post" style="display:block;" onsubmit="return confirm('¿Eliminar este rol?')">
                        <button type="submit" class="action-btn action-delete w-100 mb-2">
                            <i class="bi bi-trash3"></i>Eliminar
                        </button>
                    </form>
                    <a th:href="@{/roles}" class="btn-volver w-100 text-center">
                        <i class="bi bi-arrow-left"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>

        

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
