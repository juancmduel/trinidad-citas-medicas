<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Rol')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-shield-lock me-2" style="color:#06b6d4;"></i>Detalle del Rol
            </h1>
        </div>

        <div th:if="${rol != null}" class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between align-items-center">
                <h5><i class="bi bi-shield-check"></i> Información del Rol</h5>
                <div class="d-flex gap-2">
                    <a th:href="@{/roles/editar/{id}(id=${rol.idRol})}" class="btn-professional btn-outline-prof btn-sm">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <a th:href="@{/roles/eliminar/{id}(id=${rol.idRol})}"
                       class="btn-professional btn-danger-prof btn-sm"
                       onclick="return confirm('¿Eliminar este rol?')">
                        <i class="bi bi-trash"></i> Eliminar
                    </a>
                </div>
            </div>
            <div class="p-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Nombre</label>
                        <p style="font-weight:700;color:#06b6d4;" th:text="${rol.nombre}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Estado</label>
                        <p>
                            <span th:if="${rol.activo == 1}" class="badge-status badge-success">Activo</span>
                            <span th:unless="${rol.activo == 1}" class="badge-status badge-danger">Inactivo</span>
                        </p>
                    </div>
                    <div class="col-12" th:if="${rol.descripcion}">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Descripción</label>
                        <p th:text="${rol.descripcion}"></p>
                    </div>
                </div>
            </div>
        </div>

        <a href="/trinidad/roles" class="btn-professional btn-outline-prof">
            <i class="bi bi-arrow-left"></i> Volver
        </a>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
