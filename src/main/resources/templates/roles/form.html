<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Rol')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-shield-lock"></i><span th:text="${rol.idRol != null} ? 'Editar Rol' : 'Nuevo Rol'">Rol</span></h1>
                <p>Gestión de roles de seguridad</p>
            </div>
            <a th:href="@{/roles}" class="btn-volver">
                <i class="bi bi-arrow-left"></i>Volver
            </a>
        </div>

        <form th:action="@{/roles/guardar}" th:object="${rol}" method="post" class="rol-form">
            <div th:if="${#fields.hasErrors()}" class="alert-professional alert-danger-prof mb-4">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>Corrige los errores en el formulario antes de guardar.</span>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">

                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-shield-fill"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Información del Rol</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Nombre y descripción del rol</p>
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6 form-field">
                                <label for="nombre" class="required">Nombre del Rol</label>
                                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="Ej: ADMINISTRADOR" maxlength="30" required>
                                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Nombre único del rol en el sistema</div>
                            </div>
                            <div class="col-md-6 form-field">
                                <label for="activo">Estado</label>
                                <select id="activo" th:field="*{activo}" class="form-select">
                                    <option value="1">Activo</option>
                                    <option value="0">Inactivo</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-field mt-3">
                            <label for="descripcion">Descripción</label>
                            <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="3"
                                      placeholder="Describe el propósito y permisos de este rol..." maxlength="200"></textarea>
                        </div>
                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-lightning-fill"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Acciones</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Finaliza o descarta</p>
                            </div>
                        </div>
                        <button type="submit" class="btn-guardar w-100">
                            <i class="bi bi-check-circle"></i>
                            <span th:text="${rol.idRol != null} ? 'Guardar Cambios' : 'Crear Rol'"></span>
                        </button>
                        <a th:href="@{/roles}" class="btn-volver w-100">
                            <i class="bi bi-x-circle"></i>Cancelar
                        </a>
                    </div>

                </div>
            </div>

        </form>

        

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
