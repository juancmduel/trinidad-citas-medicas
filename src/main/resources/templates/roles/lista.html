<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Roles & Permisos')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h1 style="font-size:26px;font-weight:700;margin-bottom:4px;">
                    <i class="bi bi-shield-lock me-2" style="color:var(--accent);"></i>Roles & Permisos
                </h1>
                <p style="color:var(--text-muted);font-size:13px;margin:0;">Gestión de roles de seguridad del sistema</p>
            </div>
            <a th:href="@{/roles/nuevo}" class="btn-nuevo">
                <i class="bi bi-plus-lg"></i>Nuevo Rol
            </a>
        </div>

        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${ok}"></span>
        </div>
        <div th:if="${error}" class="alert-professional alert-danger-prof mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>

        <div class="stats-grid mb-4">
            <div class="stat-card">
                <div class="stat-icon stat-icon-total"><i class="bi bi-shield-fill"></i></div>
                <div>
                    <div class="stat-value" th:text="${#lists.size(roles)}">0</div>
                    <div class="stat-label">Total Roles</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-activo"><i class="bi bi-check-circle-fill"></i></div>
                <div>
                    <div class="stat-value" th:text="${#lists.size(roles.?[activo == 1])}">0</div>
                    <div class="stat-label">Activos</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-inactivo"><i class="bi bi-x-circle-fill"></i></div>
                <div>
                    <div class="stat-value" th:text="${#lists.size(roles.?[activo == 0])}">0</div>
                    <div class="stat-label">Inactivos</div>
                </div>
            </div>
        </div>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
            <div class="search-bar" style="flex:1;min-width:200px;">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar rol..." oninput="filterTable()">
            </div>
        </div>

        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th style="text-align:center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(roles)}">
                        <td colspan="4" class="table-empty">No hay roles registrados</td>
                    </tr>
                    <tr th:each="r : ${roles}" th:data-search="${r.nombre + ' ' + r.descripcion}">
                        <td style="font-weight:700;" th:text="${r.nombre}">-</td>
                        <td th:text="${r.descripcion ?: '-'}">-</td>
                        <td>
                            <span class="badge-estado" th:classappend="${r.activo == 1} ? 'badge-activo' : 'badge-inactivo'"
                                  th:text="${r.activo == 1} ? 'Activo' : 'Inactivo'"></span>
                        </td>
                        <td style="text-align:center;">
                            <div class="action-group">
                                <a th:href="@{/roles/{id}(id=${r.idRol})}" class="action-btn action-view" title="Ver"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/roles/editar/{id}(id=${r.idRol})}" class="action-btn action-edit" title="Editar"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/roles/toggle/{id}(id=${r.idRol})}" method="post" style="display:inline;" onsubmit="return confirm('¿Cambiar estado de este rol?')">
                                    <button type="submit" class="action-btn" th:classappend="${r.activo == 1} ? 'action-state' : 'action-activate'" th:title="${r.activo == 1} ? 'Desactivar' : 'Activar'">
                                        <i class="bi" th:classappend="${r.activo == 1} ? 'bi-pause-fill' : 'bi-play-fill'"></i>
                                    </button>
                                </form>
                                <form th:action="@{/roles/eliminar/{id}(id=${r.idRol})}" method="post" style="display:inline;" onsubmit="return confirm('¿Eliminar este rol?')">
                                    <button type="submit" class="action-btn action-delete" title="Eliminar"><i class="bi bi-trash3"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        

        <script>
        function filterTable() {
            var q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.table-modern tbody tr').forEach(function(r) {
                if (r.classList.contains('table-empty')) return;
                var data = (r.getAttribute('data-search') || '').toLowerCase();
                r.classList.toggle('hidden', q.length > 0 && data.indexOf(q) === -1);
            });
        }
        </script>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
