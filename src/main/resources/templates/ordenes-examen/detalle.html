<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Orden Examen')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-clipboard-check"></i>Orden de Examen</h1>
                <p>Detalle completo de la orden solicitada</p>
            </div>
            <span class="badge-estado-lg"
                  th:classappend="${orden.estado == 'SOLICITADO'} ? 'be-solicitado' : (${orden.estado == 'EN_PROCESO'} ? 'be-proceso' : (${orden.estado == 'COMPLETADO'} ? 'be-completado' : 'be-cancelado'))"
                  th:text="${orden.estado == 'SOLICITADO'} ? 'Solicitado' : (${orden.estado == 'EN_PROCESO'} ? 'En Proceso' : (${orden.estado == 'COMPLETADO'} ? 'Completado' : 'Cancelado'))"></span>
        </div>

        <!-- Detalle -->
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-file-earmark-medical-fill"></i></div>
                        <div>
                            <h5 class="mb-0" style="font-weight:700;">Información del Examen</h5>
                        </div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Tipo de Examen</span>
                                    <span class="df-value df-value-accent" th:text="${orden.tipoExamen}">LABORATORIO</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Nombre del Examen</span>
                                    <span class="df-value" th:text="${orden.nombreExamen}">Hemograma completo</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Fecha de Solicitud</span>
                                    <span class="df-value" th:text="${#temporals.format(orden.fechaSolicitud, 'dd/MM/yyyy HH:mm')}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6" th:if="${orden.fechaResultado}">
                                <div class="detail-field">
                                    <span class="df-label">Fecha de Resultado</span>
                                    <span class="df-value" th:text="${#temporals.format(orden.fechaResultado, 'dd/MM/yyyy HH:mm')}">-</span>
                                </div>
                            </div>
                            <div class="col-12" th:if="${orden.indicaciones}">
                                <div class="detail-field">
                                    <span class="df-label">Indicaciones / Preparación</span>
                                    <span class="df-value" th:text="${orden.indicaciones}">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-person-fill"></i></div>
                        <div>
                            <h5 class="mb-0" style="font-weight:700;">Paciente y Médico</h5>
                        </div>
                    </div>
                    <div class="detail-card-body">
                        <div class="detail-field">
                            <span class="df-label">Paciente</span>
                            <span class="df-value" style="font-size:1rem;"
                                  th:text="${orden.atencion?.cita?.paciente?.apellidoPaterno + ' ' + orden.atencion?.cita?.paciente?.apellidoMaterno + ', ' + orden.atencion?.cita?.paciente?.nombres}">-</span>
                        </div>
                        <div class="detail-field">
                            <span class="df-label">Médico</span>
                            <span class="df-value" th:text="${orden.atencion?.cita?.medico?.nombreCompleto}">-</span>
                        </div>
                        <div class="detail-field" th:if="${orden.atencion?.cita?.medico?.especialidadNombre}">
                            <span class="df-label">Especialidad</span>
                            <span class="df-value" th:text="${orden.atencion?.cita?.medico?.especialidadNombre}">-</span>
                        </div>
                    </div>
                </div>

                <div class="detail-actions">
                    <a th:href="@{/ordenes-examen/editar/{id}(id=${orden.idOrden})}" class="action-btn w-100">
                        <i class="bi bi-pencil"></i>Editar Orden
                    </a>
                    <form th:action="@{/ordenes-examen/eliminar/{id}(id=${orden.idOrden})}" method="post" style="display:block;" onsubmit="return confirm('¿Eliminar esta orden de examen?')">
                        <button type="submit" class="action-btn action-delete w-100">
                            <i class="bi bi-trash3"></i>Eliminar
                        </button>
                    </form>
                    <a th:href="@{/ordenes-examen}" class="btn-volver w-100 text-center">
                        <i class="bi bi-arrow-left"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>

        

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
