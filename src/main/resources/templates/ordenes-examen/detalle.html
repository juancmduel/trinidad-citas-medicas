<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Orden Examen')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-flask me-2" style="color:#06b6d4;"></i>Orden de Examen
            </h1>
        </div>

        <div th:if="${orden != null}" class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between">
                <h5><i class="bi bi-file-earmark-medical"></i> Detalles de la Orden</h5>
                <span th:classappend="${orden.estado == 'COMPLETADO' ? 'badge-success' : orden.estado == 'EN PROCESO' ? 'badge-warning' : 'badge-info'}" class="badge-status" th:text="${orden.estado}"></span>
            </div>
            <div class="p-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Tipo de Examen</label>
                        <p style="font-weight:700;color:#06b6d4;" th:text="${orden.tipoExamen}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Nombre del Examen</label>
                        <p th:text="${orden.nombreExamen}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Solicitud</label>
                        <p th:text="${#temporals.format(orden.fechaSolicitud, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>
                    <div class="col-md-4" th:if="${orden.fechaResultado}">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Resultado</label>
                        <p th:text="${#temporals.format(orden.fechaResultado, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>
                    <div class="col-12" th:if="${orden.indicaciones}">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Indicaciones</label>
                        <p th:text="${orden.indicaciones}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <a th:href="@{/ordenes-examen/editar/{id}(id=${orden.idOrden})}" class="btn-professional btn-outline-prof">
                <i class="bi bi-pencil"></i> Editar
            </a>
            <form th:action="@{/ordenes-examen/eliminar/{id}(id=${orden.idOrden})}" method="post" style="display:inline;">
                <button type="submit" class="btn-professional btn-danger-prof"
                        onclick="return confirm('¿Eliminar esta orden?')">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
            </form>
            <a href="/trinidad/ordenes-examen" class="btn-professional btn-outline-prof">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
