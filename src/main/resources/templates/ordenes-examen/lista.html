<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Órdenes de Examen')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="container-xl">
            <div class="page-header">
                <div class="row align-items-center">
                    <div class="col">
                        <h2 class="page-title"><i class="fa-solid fa-flask"></i> Órdenes de Examen</h2>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/ordenes-examen/nueva}" class="btn btn-primary">
                            <i class="fa-solid fa-plus"></i> Nueva Orden
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="page-wrapper">
            <div class="container-xl">
                <div th:if="${ok}" class="alert alert-success alert-dismissible mb-3" th:text="${ok}"></div>
                <div class="card">
                    <div class="table-responsive">
                        <table class="table card-table table-vcenter">
                            <thead>
                                <tr>
                                    <th>Paciente</th>
                                    <th>Médico</th>
                                    <th>Tipo Examen</th>
                                    <th>Nombre Examen</th>
                                    <th>Fecha Solicitud</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${ordenes.isEmpty()}">
                                    <td colspan="7" class="text-center py-4">No hay órdenes de examen registradas</td>
                                </tr>
                                <tr th:each="o : ${ordenes}">
                                    <td th:text="${o.atencion?.cita?.paciente?.apellidoPaterno + ' ' + o.atencion?.cita?.paciente?.nombres}">-</td>
                                    <td th:text="${o.atencion?.cita?.medico?.nombreCompleto}">-</td>
                                    <td th:text="${o.tipoExamen}"></td>
                                    <td th:text="${o.nombreExamen}"></td>
                                    <td th:text="${#temporals.format(o.fechaSolicitud, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${o.estado == 'SOLICITADO'} ? 'bg-warning text-dark' : (${o.estado == 'COMPLETADO'} ? 'bg-success' : 'bg-secondary')"
                                              th:text="${o.estado}"></span>
                                    </td>
                                    <td>
                                        <a th:href="@{/ordenes-examen/{id}(id=${o.idOrden})}" class="btn btn-sm btn-outline-info"><i class="fa-solid fa-eye"></i></a>
                                        <a th:href="@{/ordenes-examen/editar/{id}(id=${o.idOrden})}" class="btn btn-sm btn-outline-warning"><i class="fa-solid fa-pencil"></i></a>
                                        <a th:href="@{/ordenes-examen/eliminar/{id}(id=${o.idOrden})}" class="btn btn-sm btn-outline-danger"
                                           onclick="return confirm('¿Eliminar esta orden?')"><i class="fa-solid fa-trash"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
