<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Detalle Paciente')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-person-circle"></i>Detalle del Paciente</h1>
                <p>Información completa del paciente registrado</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/pacientes/{id}/editar(id=${paciente.idPaciente})}" class="btn-nuevo">
                    <i class="bi bi-pencil-fill"></i>Editar
                </a>
                <a th:href="@{/pacientes}" class="btn-ver">
                    <i class="bi bi-arrow-left"></i>Volver
                </a>
            </div>
        </div>

        <div class="detail-card mb-4">
            <div class="detail-card-head">
                <span class="dch-icon"><i class="bi bi-person-badge"></i></span>
                <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Datos Personales</span>
            </div>
            <div class="detail-card-body">
                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">DNI</span>
                            <span class="df-value df-value-accent" th:text="${paciente.dni}"></span>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="detail-field">
                            <span class="df-label">Nombre Completo</span>
                            <span class="df-value" th:text="${paciente.apellidoPaterno + ' ' + (paciente.apellidoMaterno ?: '') + ', ' + paciente.nombres}"></span>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="detail-field">
                            <span class="df-label">Sexo</span>
                            <span class="df-value">
                                <span th:if="${paciente.sexo == 'M'}" class="badge-estado badge-estado-info">Masculino</span>
                                <span th:if="${paciente.sexo == 'F'}" class="badge-estado badge-estado-danger">Femenino</span>
                            </span>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="detail-field">
                            <span class="df-label">Tipo de Sangre</span>
                            <span class="df-value"><span class="badge-estado badge-estado-primary" th:text="${paciente.tipoSangre ?: 'N/D'}"></span></span>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Fecha de Nacimiento</span>
                            <span class="df-value" th:text="${#temporals.format(paciente.fechaNacimiento, 'dd/MM/yyyy')}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Teléfono</span>
                            <span class="df-value" th:text="${paciente.telefono ?: '-'}"></span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="detail-field">
                            <span class="df-label">Email</span>
                            <span class="df-value" th:text="${paciente.email ?: '-'}"></span>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="detail-field">
                            <span class="df-label">Distrito</span>
                            <span class="df-value" th:text="${paciente.distrito ?: '-'}"></span>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <div class="detail-field">
                            <span class="df-label">Dirección</span>
                            <span class="df-value" th:text="${paciente.direccion ?: '-'}"></span>
                        </div>
                    </div>

                    <div class="col-md-12" th:if="${paciente.alergias != null and !#strings.isEmpty(paciente.alergias)}">
                        <div class="detail-field">
                            <span class="df-label">Alergias conocidas</span>
                            <span class="df-value" style="color:var(--warning);" th:text="${paciente.alergias}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="detail-card">
            <div class="detail-card-head">
                <span class="dch-icon"><i class="bi bi-lightning-charge"></i></span>
                <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Acciones rápidas</span>
            </div>
            <div class="detail-card-body">
                <div class="d-flex gap-3 flex-wrap">
                    <a th:href="@{/citas/agendar(idPaciente=${paciente.idPaciente})}" class="btn-nuevo">
                        <i class="bi bi-calendar-plus"></i>Agendar Cita
                    </a>
                    <a th:href="@{/citas/paciente/{id}(id=${paciente.idPaciente})}" class="btn-ver">
                        <i class="bi bi-calendar-event"></i>Ver Citas
                    </a>
                    <a th:href="@{/historias/paciente/{id}(id=${paciente.idPaciente})}" class="btn-ver">
                        <i class="bi bi-file-medical"></i>Historia Clínica
                    </a>
                </div>
            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
