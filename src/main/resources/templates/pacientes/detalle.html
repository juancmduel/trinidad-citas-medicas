<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Detalle Paciente')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">

        <!-- Encabezado -->
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                        <i class="bi bi-person-circle me-2" style="color:#06b6d4;"></i>Detalle del Paciente
                    </h1>
                    <p style="color:rgba(255,255,255,0.5);font-size:13px;">Información completa del paciente registrado</p>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/pacientes/{id}/editar(id=${paciente.idPaciente})}"
                       class="btn-nuevo">
                        <i class="bi bi-pencil-fill"></i>Editar
                    </a>
                    <a th:href="@{/pacientes}" class="btn-ver">
                        <i class="bi bi-arrow-left"></i>Volver
                    </a>
                </div>
            </div>
        </div>

        <!-- Datos personales -->
        <div class="card-professional mb-4">
            <div class="card-header-professional">
                <h5><i class="bi bi-person-badge"></i>Datos Personales</h5>
            </div>
            <div class="p-4">
                <div class="row g-4">
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">DNI</label>
                        <p style="font-size:1.1rem;font-weight:700;color:#06b6d4;" th:text="${paciente.dni}">-</p>
                    </div>
                    <div class="col-md-5">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Nombre Completo</label>
                        <p style="font-size:1.1rem;font-weight:700;"
                           th:text="${paciente.apellidoPaterno + ' ' + (paciente.apellidoMaterno ?: '') + ', ' + paciente.nombres}">-</p>
                    </div>
                    <div class="col-md-2">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Sexo</label>
                        <p>
                            <span th:if="${paciente.sexo == 'M'}" class="badge-status badge-info">Masculino</span>
                            <span th:if="${paciente.sexo == 'F'}" class="badge-status badge-danger">Femenino</span>
                        </p>
                    </div>
                    <div class="col-md-2">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Tipo de Sangre</label>
                        <p>
                            <span class="badge-status badge-primary" th:text="${paciente.tipoSangre ?: 'N/D'}">-</span>
                        </p>
                    </div>

                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Fecha de Nacimiento</label>
                        <p th:text="${#temporals.format(paciente.fechaNacimiento, 'dd/MM/yyyy')}">-</p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Teléfono</label>
                        <p th:text="${paciente.telefono ?: '-'}">-</p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Email</label>
                        <p th:text="${paciente.email ?: '-'}">-</p>
                    </div>
                    <div class="col-md-2">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Distrito</label>
                        <p th:text="${paciente.distrito ?: '-'}">-</p>
                    </div>

                    <div class="col-md-12">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Dirección</label>
                        <p th:text="${paciente.direccion ?: '-'}">-</p>
                    </div>

                    <div class="col-md-12" th:if="${paciente.alergias != null and !#strings.isEmpty(paciente.alergias)}">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;text-transform:uppercase;">Alergias conocidas</label>
                        <p style="color:#f59e0b;" th:text="${paciente.alergias}">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Acciones rápidas -->
        <div class="card-professional">
            <div class="card-header-professional">
                <h5><i class="bi bi-lightning-charge"></i>Acciones Rápidas</h5>
            </div>
            <div class="p-4">
                <div class="d-flex gap-3 flex-wrap">
                    <a th:href="@{/citas/agendar(idPaciente=${paciente.idPaciente})}"
                       class="btn-nuevo">
                        <i class="bi bi-calendar-plus"></i>Agendar Cita
                    </a>
                    <a th:href="@{/citas/paciente/{id}(id=${paciente.idPaciente})}"
                       class="btn-ver">
                        <i class="bi bi-calendar-event"></i>Ver Citas
                    </a>
                    <a th:href="@{/historias/paciente/{id}(id=${paciente.idPaciente})}"
                       class="btn-ver">
                        <i class="bi bi-file-medical"></i>Historia Clínica
                    </a>
                </div>
            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
