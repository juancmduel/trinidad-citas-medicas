<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Paciente')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${modo == 'crear'} ? 'Nuevo Paciente' : 'Editar Paciente'">Paciente</h1>
                <p class="page-subtitle">Complete los datos del paciente en el sistema</p>
            </div>
            <a th:href="@{/pacientes}" class="btn-volver"><i class="bi bi-arrow-left"></i>Volver</a>
        </div>

        <div th:if="${error}" class="alert alert-danger" style="border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.1); color: #fca5a5;">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>

        <div class="form-container">
            <div class="form-header">
                <i class="bi bi-person-plus"></i>
                <h3 th:text="${modo == 'crear'} ? 'Información Personal' : 'Actualizar Información'"></h3>
            </div>

            <form th:action="${modo == 'crear'} ? @{/pacientes/nuevo} : @{/pacientes/{id}/editar(id=${paciente.idPaciente})}"
                  th:object="${paciente}" method="post" novalidate>
                <input type="hidden" th:field="*{idPaciente}">

                <!-- Fila 1: Datos de Identificación -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="dni" class="required">DNI</label>
                        <input type="text" id="dni" th:field="*{dni}" class="form-control" 
                               maxlength="8" placeholder="12345678" required
                               th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                    </div>
                    <div class="form-group">
                        <label for="sexo" class="required">Sexo</label>
                        <select id="sexo" th:field="*{sexo}" class="form-select" required
                                th:classappend="${#fields.hasErrors('sexo')} ? 'is-invalid'">
                            <option value="">Seleccionar...</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('sexo')}" th:errors="*{sexo}"></div>
                    </div>
                    <div class="form-group">
                        <label for="fechaNacimiento" class="required">Fecha de Nacimiento</label>
                        <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" 
                               class="form-control" required
                               th:classappend="${#fields.hasErrors('fechaNacimiento')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></div>
                    </div>
                </div>

                <!-- Fila 2: Datos Personales Completos -->
                <div class="form-section">
                    <div class="form-group">
                        <label for="nombres" class="required">Nombres Completos</label>
                        <input type="text" id="nombres" th:field="*{nombres}" class="form-control" 
                               placeholder="Juan Carlos" required
                               th:classappend="${#fields.hasErrors('nombres')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nombres')}" th:errors="*{nombres}"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="apellidoPaterno" class="required">Apellido Paterno</label>
                            <input type="text" id="apellidoPaterno" th:field="*{apellidoPaterno}" 
                                   class="form-control" placeholder="Rodríguez" required
                                   th:classappend="${#fields.hasErrors('apellidoPaterno')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidoPaterno')}" th:errors="*{apellidoPaterno}"></div>
                        </div>
                        <div class="form-group">
                            <label for="apellidoMaterno">Apellido Materno</label>
                            <input type="text" id="apellidoMaterno" th:field="*{apellidoMaterno}" 
                                   class="form-control" placeholder="García"
                                   th:classappend="${#fields.hasErrors('apellidoMaterno')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidoMaterno')}" th:errors="*{apellidoMaterno}"></div>
                        </div>
                    </div>
                </div>

                <!-- Fila 3: Contacto -->
                <div class="form-section">
                    <div class="form-header">
                        <i class="bi bi-telephone"></i>
                        <h3>Información de Contacto</h3>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" th:field="*{telefono}" class="form-control" 
                                   placeholder="+51 987 654 321"
                                   th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                        </div>
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" 
                                   placeholder="paciente@ejemplo.com"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" th:field="*{direccion}" class="form-control" 
                               placeholder="Av. Principal 123, Apt. 4B"
                               th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="distrito">Distrito</label>
                            <input type="text" id="distrito" th:field="*{distrito}" class="form-control" 
                                   placeholder="San Isidro"
                                   th:classappend="${#fields.hasErrors('distrito')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('distrito')}" th:errors="*{distrito}"></div>
                        </div>
                    </div>
                </div>

                <!-- Fila 4: Datos Médicos -->
                <div class="form-section">
                    <div class="form-header">
                        <i class="bi bi-heart-pulse"></i>
                        <h3>Información Médica</h3>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="tipoSangre">Tipo de Sangre</label>
                            <select id="tipoSangre" th:field="*{tipoSangre}" class="form-select"
                                    th:classappend="${#fields.hasErrors('tipoSangre')} ? 'is-invalid'">
                                <option value="">Seleccionar tipo...</option>
                                <option value="O+">O+ (Positivo)</option>
                                <option value="O-">O- (Negativo)</option>
                                <option value="A+">A+ (Positivo)</option>
                                <option value="A-">A- (Negativo)</option>
                                <option value="B+">B+ (Positivo)</option>
                                <option value="B-">B- (Negativo)</option>
                                <option value="AB+">AB+ (Positivo)</option>
                                <option value="AB-">AB- (Negativo)</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('tipoSangre')}" th:errors="*{tipoSangre}"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="alergias">Alergias Conocidas</label>
                        <textarea id="alergias" th:field="*{alergias}" class="form-control" 
                                  placeholder="Describir cualquier alergia importante, medicamentos, alimentos, etc. (Dejar en blanco si no hay)"
                                  rows="3"
                                  th:classappend="${#fields.hasErrors('alergias')} ? 'is-invalid'"></textarea>
                        <div class="form-text">
                            <i class="bi bi-info-circle"></i> Información importante para el personal médico
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('alergias')}" th:errors="*{alergias}"></div>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="form-actions">
                    <button type="submit" class="btn-guardar">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${modo == 'crear'} ? 'Registrar Paciente' : 'Guardar Cambios'"></span>
                    </button>
                    <a th:href="@{/pacientes}" class="btn-volver">
                        <i class="bi bi-x-circle"></i>
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
