<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Pacientes')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-people-fill"></i>Pacientes</h1>
                <p>Gestión y registro de pacientes del sistema</p>
            </div>
            <a th:href="@{/pacientes/nuevo}" class="btn-nuevo">
                <i class="bi bi-plus-circle-fill"></i>Nuevo Paciente
            </a>
        </div>

        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${ok}"></span>
        </div>

        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>DNI</th>
                        <th>Nombre Completo</th>
                        <th>Sexo</th>
                        <th>Teléfono</th>
                        <th>Distrito</th>
                        <th>Tipo Sangre</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${pacientes}">
                        <td>
                            <span class="badge-estado badge-estado-primary" th:text="${p.dni}"></span>
                        </td>
                        <td>
                            <strong th:text="${p.apellidoPaterno + ' ' + p.apellidoMaterno + ', ' + p.nombres}"></strong>
                        </td>
                        <td>
                            <span th:if="${p.sexo == 'M'}" class="badge-estado badge-estado-info">Masculino</span>
                            <span th:if="${p.sexo == 'F'}" class="badge-estado badge-estado-danger">Femenino</span>
                        </td>
                        <td th:text="${p.telefono ?: '-'}"></td>
                        <td th:text="${p.distrito ?: '-'}"></td>
                        <td>
                            <span class="badge-estado badge-estado-primary" th:text="${p.tipoSangre ?: 'N/D'}"></span>
                        </td>
                        <td><div class="acciones-tabla">
                            <a th:href="@{/pacientes/{id}(id=${p.idPaciente})}" class="btn-ver" title="Ver">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/pacientes/{id}/editar(id=${p.idPaciente})}" class="btn-editar" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </div></td></tr>
                    <tr th:if="${#lists.isEmpty(pacientes)}">
                        <td colspan="7" class="table-empty">
                            <i class="bi bi-inbox"></i>
                            <p>No hay pacientes registrados</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
