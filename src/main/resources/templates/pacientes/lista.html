<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Pacientes')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <!-- Page Header -->
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                        <i class="bi bi-people-fill me-2" style="color:#06b6d4;"></i>Pacientes
                    </h1>
                    <p style="color:rgba(255,255,255,0.5);font-size:13px;">Gestión y registro de pacientes del sistema</p>
                </div>
                <a th:href="@{/pacientes/nuevo}" class="btn-nuevo">
                    <i class="bi bi-plus-circle-fill"></i>Nuevo Paciente
                </a>
            </div>
        </div>

        <!-- Success Alert -->
        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${ok}"></span>
        </div>

        <!-- Patients Table Card -->
        <div class="card-professional">
            <div class="card-header-professional">
                <h5><i class="bi bi-list-check"></i>Pacientes Registrados</h5>
            </div>
            <div class="p-4">
                <div class="table-responsive">
                    <table class="table-professional">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Nombre Completo</th>
                                <th>Sexo</th>
                                <th>Teléfono</th>
                                <th>Distrito</th>
                                <th>Tipo Sangre</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${pacientes}">
                                <td>
                                    <span class="badge-status badge-primary" th:text="${p.dni}"></span>
                                </td>
                                <td>
                                    <strong th:text="${p.apellidoPaterno + ' ' + p.apellidoMaterno + ', ' + p.nombres}"></strong>
                                </td>
                                <td>
                                    <span th:if="${p.sexo == 'M'}" class="badge-status badge-info">Masculino</span>
                                    <span th:if="${p.sexo == 'F'}" class="badge-status badge-danger">Femenino</span>
                                </td>
                                <td th:text="${p.telefono ?: '-'}"></td>
                                <td th:text="${p.distrito ?: '-'}"></td>
                                <td>
                                    <span class="badge-status badge-primary" th:text="${p.tipoSangre ?: 'N/D'}"></span>
                                </td>
                                <td><div class="acciones-tabla">
                                    <a th:href="@{/pacientes/{id}(id=${p.idPaciente})}" class="btn-ver" title="Ver">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/pacientes/{id}/editar(id=${p.idPaciente})}" class="btn-professional btn-outline-prof btn-sm ms-2" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                </div></td></tr>
                            <tr th:if="${#lists.isEmpty(pacientes)}">
                                <td colspan="7" style="text-align:center; padding:3rem 1.25rem; color:rgba(255,255,255,0.5);">
                                    <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
                                    <p class="mt-2">No hay pacientes registrados</p>
                                </div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
