<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' | Trinidad' : 'Trinidad'}">Trinidad</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/trinidad.css}">
    <style>
        :root {
            --bg-deep: #061220;
            --bg-dark: #0a1628;
            --bg-darker: #0f1419;
            --accent: #06b6d4;
            --success: #10b981;
            --primary: #003d7a;
            --secondary: #006ba3;
            --text-light: #e5e7eb;
            --border-color: rgba(255, 255, 255, 0.05);
            --sidebar-width: 250px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
        }

        .app-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--bg-darker) 0%, var(--bg-deep) 100%);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .sidebar-brand-icon {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .sidebar-brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 0.95rem;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 500;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--success);
            font-weight: 500;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0;
        }

        .menu-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            padding: 0.5rem 1.5rem;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
        }

        .sidebar-item:hover {
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent);
            border-left-color: var(--accent);
            transform: translateX(2px);
        }

        .sidebar-item.active {
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .sidebar-item i {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .logout-btn {
            color: #ef4444;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ff6b6b;
            border-left-color: #ff6b6b;
        }

        /* Main Content Area */
        .app-main {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - var(--sidebar-width));
        }

        /* Topbar */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
            height: 70px;
            gap: 1rem;
        }

        .topbar-toggle {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
            padding: 0.5rem;
        }

        .topbar-toggle:hover {
            color: white;
        }

        .topbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            flex: 1;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .topbar-user {
            font-size: 0.9rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
        }

        .btn-topbar-logout {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-light);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-topbar-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ff6b6b;
            border-color: #ff6b6b;
        }

        /* Page Content */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        /* Responsive */
        @media (max-width: 992px) {
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
            }

            #sidebar.open {
                transform: translateX(0);
            }

            .app-main {
                margin-left: 0;
                width: 100%;
            }

            .topbar-toggle {
                display: block;
            }

            #sidebarOverlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 999;
            }

            #sidebarOverlay.show {
                display: block;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.6);
        }

        /* Cards and common elements */
        .card {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .card-header {
            background: var(--bg-darker);
            border-bottom: 1px solid var(--border-color);
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 61, 122, 0.3);
            background: linear-gradient(135deg, var(--secondary), #008ec4);
            color: white;
        }

        .btn-outline-primary {
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline-primary:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-deep);
        }

        /* Tables */
        .table {
            color: var(--text-light);
        }

        .table-hover tbody tr:hover {
            background: rgba(6, 182, 212, 0.1);
        }

        .table-dark {
            background: transparent;
        }

        .table-dark thead {
            background: var(--bg-darker);
            border-bottom: 2px solid var(--primary);
        }

        .table-dark th {
            color: var(--success);
            font-weight: 600;
            border-color: var(--border-color);
        }

        .table-dark td {
            border-color: var(--border-color);
            vertical-align: middle;
        }

        /* Forms */
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: 0.375rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(6, 182, 212, 0.15);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-label {
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        /* Alerts */
        .alert {
            border: none;
            border-left: 4px solid;
            border-radius: 0.375rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-left-color: var(--success);
            color: var(--success);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: #ef4444;
            color: #fca5a5;
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: #fbbf24;
            color: #fcd34d;
        }

        /* Badges */
        .badge {
            padding: 0.5rem 0.75rem;
            font-weight: 500;
            border-radius: 0.25rem;
        }

        /* Page heading */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .page-header-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <nav id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon"><i class="bi bi-hospital-fill"></i></div>
                <div class="sidebar-brand-text">
                    <span class="brand-name">TRINIDAD</span>
                    <span class="brand-sub">Sistema Médico</span>
                </div>
            </div>

            <div class="sidebar-user" sec:authorize="isAuthenticated()">
                <div class="user-avatar"><i class="bi bi-person-fill"></i></div>
                <div class="user-info">
                    <span class="user-name" sec:authentication="name">Usuario</span>
                    <span class="user-role">En línea</span>
                </div>
            </div>

            <div class="sidebar-menu" sec:authorize="isAuthenticated()">
                <p class="menu-label">PRINCIPAL</p>
                <a class="sidebar-item" th:href="@{/dashboard}" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
                    <i class="bi bi-speedometer2"></i><span>Dashboard</span>
                </a>
                <a class="sidebar-item" th:href="@{/citas/calendario}" th:classappend="${currentPage == 'calendario' ? 'active' : ''}">
                    <i class="bi bi-calendar3"></i><span>Calendario</span>
                </a>
                <a class="sidebar-item" th:href="@{/citas/agendar}" th:classappend="${currentPage == 'agendar' ? 'active' : ''}">
                    <i class="bi bi-calendar-plus"></i><span>Agendar Cita</span>
                </a>

                <p class="menu-label mt-2">GESTIÓN</p>
                <a class="sidebar-item" th:href="@{/pacientes}" th:classappend="${currentPage == 'pacientes' ? 'active' : ''}">
                    <i class="bi bi-people-fill"></i><span>Pacientes</span>
                </a>
                <a class="sidebar-item" th:href="@{/medicos}" th:classappend="${currentPage == 'medicos' ? 'active' : ''}">
                    <i class="bi bi-person-badge"></i><span>Médicos</span>
                </a>
                <a class="sidebar-item" th:href="@{/especialidades}" th:classappend="${currentPage == 'especialidades' ? 'active' : ''}">
                    <i class="bi bi-heart-pulse"></i><span>Especialidades</span>
                </a>
                <a class="sidebar-item" th:href="@{/citas}" th:classappend="${currentPage == 'citas' ? 'active' : ''}">
                    <i class="bi bi-calendar-event"></i><span>Citas</span>
                </a>

                <p class="menu-label mt-2" sec:authorize="hasRole('ADMIN')">ADMINISTRACIÓN</p>
                <a class="sidebar-item" th:href="@{/usuarios}" th:classappend="${currentPage == 'usuarios' ? 'active' : ''}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-person-gear"></i><span>Usuarios</span>
                </a>
                <a class="sidebar-item" th:href="@{/roles}" th:classappend="${currentPage == 'roles' ? 'active' : ''}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-shield-lock"></i><span>Roles & Permisos</span>
                </a>
                <a class="sidebar-item" th:href="@{/auditoria}" th:classappend="${currentPage == 'auditoria' ? 'active' : ''}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-clock-history"></i><span>Auditoría</span>
                </a>
                <a class="sidebar-item" th:href="@{/reportes}" th:classappend="${currentPage == 'reportes' ? 'active' : ''}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-bar-chart"></i><span>Reportes</span>
                </a>
                <a class="sidebar-item" th:href="@{/configuracion}" th:classappend="${currentPage == 'configuracion' ? 'active' : ''}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-gear"></i><span>Configuración</span>
                </a>
            </div>

            <div class="sidebar-footer" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="sidebar-item logout-btn w-100 text-start">
                        <i class="bi bi-box-arrow-left"></i><span>Cerrar Sesión</span>
                    </button>
                </form>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="app-main">
            <!-- Topbar -->
            <div id="topbar">
                <button class="topbar-toggle d-lg-none" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show')">
                    <i class="bi bi-list"></i>
                </button>
                <div class="topbar-title">
                    <i class="bi bi-hospital me-2"></i>TRINIDAD MEDICAL
                </div>
                <div class="topbar-right" sec:authorize="isAuthenticated()">
                    <span class="topbar-user">
                        <i class="bi bi-circle-fill text-success me-1" style="font-size:0.45rem;"></i>
                        Bienvenido, <strong class="ms-1" style="color:#06b6d4;" sec:authentication="name">Usuario</strong>
                    </span>
                    <form th:action="@{/logout}" method="post" class="mb-0">
                        <button type="submit" class="btn-topbar-logout">
                            <i class="bi bi-box-arrow-right"></i> Salir
                        </button>
                    </form>
                </div>
            </div>

            <!-- Page Content -->
            <div class="app-content">
                <th:block th:insert="~{${content}}" />
            </div>
        </div>
    </div>

    <div id="sidebarOverlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show');"></div>

    <script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
