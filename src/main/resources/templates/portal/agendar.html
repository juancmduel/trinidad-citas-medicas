<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header-paciente :: head(${titulo})}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header-paciente :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header-paciente :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-calendar-plus"></i>Agendar Cita Online</h1>
                <p>Solicita tu atenci&oacute;n m&eacute;dica desde casa</p>
            </div>
        </div>

        <div th:if="${error}" class="alert-professional alert-danger-prof mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>

        <div class="stats-grid mb-4">
            <div class="stat-card">
                <div class="stat-icon stat-icon-total"><i class="bi bi-laptop"></i></div>
                <div>
                    <div class="stat-value">Online</div>
                    <div class="stat-label">Tipo de cita</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-activo"><i class="bi bi-shield-check"></i></div>
                <div>
                    <div class="stat-value">Segura</div>
                    <div class="stat-label">Plataforma</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-info"><i class="bi bi-clock-history"></i></div>
                <div>
                    <div class="stat-value" th:text="${#temporals.format(#temporals.createToday(), 'dd/MM/yyyy')}">Hoy</div>
                    <div class="stat-label">Fecha actual</div>
                </div>
            </div>
        </div>

        <form th:action="@{/portal/agendar}" method="post" th:object="${cita}">

            <div class="card-modern mb-4">
                <div class="card-header-modern">
                    <span class="step-badge">1</span>
                    <h5 class="mb-0 ms-2">Especialidad &amp; M&eacute;dico</h5>
                </div>
                <div class="card-body-modern">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="input-group-modern">
                                <span class="input-icon"><i class="bi bi-heart-pulse"></i></span>
                                <div class="input-group-modern-body">
                                    <label class="form-label-modern">Especialidad *</label>
                                    <select th:field="*{idEspecialidad}" class="form-control-modern" required
                                            th:classappend="${#fields.hasErrors('idEspecialidad')} ? 'is-invalid' : ''">
                                        <option value="">-- Seleccione especialidad --</option>
                                        <option th:each="e : ${especialidades}"
                                                th:value="${e.idEspecialidad}"
                                                th:text="${e.nombre}"></option>
                                    </select>
                                    <small class="text-danger" th:if="${#fields.hasErrors('idEspecialidad')}" th:errors="*{idEspecialidad}"></small>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group-modern">
                                <span class="input-icon"><i class="bi bi-person-badge"></i></span>
                                <div class="input-group-modern-body">
                                    <label class="form-label-modern">M&eacute;dico *</label>
                                    <select th:field="*{idMedico}" class="form-control-modern" required
                                            th:classappend="${#fields.hasErrors('idMedico')} ? 'is-invalid' : ''">
                                        <option value="">-- Seleccione m&eacute;dico --</option>
                                        <option th:each="m : ${medicos}"
                                                th:value="${m.idMedico}"
                                                th:text="${m.nombreCompleto} + ' - ' + ${m.especialidadNombre}"></option>
                                    </select>
                                    <small class="text-danger" th:if="${#fields.hasErrors('idMedico')}" th:errors="*{idMedico}"></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-modern mb-4">
                <div class="card-header-modern">
                    <span class="step-badge">2</span>
                    <h5 class="mb-0 ms-2">Fecha &amp; Horario</h5>
                </div>
                <div class="card-body-modern">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="input-group-modern">
                                <span class="input-icon"><i class="bi bi-calendar"></i></span>
                                <div class="input-group-modern-body">
                                    <label class="form-label-modern">Fecha *</label>
                                    <input type="date" th:field="*{fechaCita}" class="form-control-modern" required
                                           th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"
                                           th:classappend="${#fields.hasErrors('fechaCita')} ? 'is-invalid' : ''">
                                    <small class="text-danger" th:if="${#fields.hasErrors('fechaCita')}" th:errors="*{fechaCita}"></small>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group-modern">
                                <span class="input-icon"><i class="bi bi-clock"></i></span>
                                <div class="input-group-modern-body">
                                    <label class="form-label-modern">Hora *</label>
                                    <input type="time" th:field="*{horaInicio}" class="form-control-modern" required
                                           th:classappend="${#fields.hasErrors('horaInicio')} ? 'is-invalid' : ''">
                                    <small class="text-danger" th:if="${#fields.hasErrors('horaInicio')}" th:errors="*{horaInicio}"></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-modern mb-4">
                <div class="card-header-modern">
                    <span class="step-badge">3</span>
                    <h5 class="mb-0 ms-2">Motivo de Consulta</h5>
                </div>
                <div class="card-body-modern">
                    <div class="input-group-modern">
                        <span class="input-icon"><i class="bi bi-chat-dots"></i></span>
                        <div class="input-group-modern-body">
                            <label class="form-label-modern">Describe tu consulta</label>
                            <textarea th:field="*{motivoConsulta}" class="form-control-modern" rows="3"
                                      placeholder="Describe brevemente tus s&iacute;ntomas o el motivo de tu visita (opcional)" maxlength="300"
                                      th:classappend="${#fields.hasErrors('motivoConsulta')} ? 'is-invalid' : ''"></textarea>
                            <small class="text-danger" th:if="${#fields.hasErrors('motivoConsulta')}" th:errors="*{motivoConsulta}"></small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 justify-content-between align-items-center">
                <a th:href="@{/portal/dashboard}" class="btn btn-modern btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-modern btn-primary btn-lg">
                    <i class="bi bi-check-lg"></i> Solicitar Cita Online
                </button>
            </div>

        </form>

    </main>
    <footer th:replace="~{fragments/header-paciente :: footer}"></footer>
</div>
</body>
</html>
