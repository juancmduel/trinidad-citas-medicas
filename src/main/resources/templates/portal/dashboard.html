<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header-paciente :: head(${titulo})}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header-paciente :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header-paciente :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-person-circle"></i>Mi Portal</h1>
                <p>Bienvenido, <strong th:text="${paciente.nombreCompleto}"></strong></p>
            </div>
        </div>

        <div class="stats-grid mb-4">
            <div class="stat-card">
                <div class="stat-icon stat-icon-total"><i class="bi bi-calendar-check"></i></div>
                <div>
                    <div class="stat-value" th:text="${proximasCitas.size()}">0</div>
                    <div class="stat-label">Pr&oacute;ximas Citas</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-activo"><i class="bi bi-clock-history"></i></div>
                <div>
                    <div class="stat-value">-</div>
                    <div class="stat-label">Pr&oacute;xima Cita</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-info"><i class="bi bi-file-earmark-medical"></i></div>
                <div>
                    <a th:href="@{/portal/historia}" class="btn btn-modern btn-primary btn-sm">
                        <i class="bi bi-eye"></i> Ver Historia
                    </a>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-inactivo"><i class="bi bi-person-gear"></i></div>
                <div>
                    <a th:href="@{/portal/mi-perfil}" class="btn btn-modern btn-secondary btn-sm">
                        <i class="bi bi-pencil"></i> Mi Perfil
                    </a>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <a th:href="@{/portal/agendar}" class="btn btn-modern btn-primary w-100 py-3">
                    <i class="bi bi-calendar-plus fs-4"></i><br>
                    <span>Agendar Nueva Cita</span>
                </a>
            </div>
            <div class="col-md-6">
                <a th:href="@{/portal/mis-citas}" class="btn btn-modern btn-info w-100 py-3">
                    <i class="bi bi-list-check fs-4"></i><br>
                    <span>Ver Mis Citas</span>
                </a>
            </div>
        </div>

        <div class="card-modern">
            <div class="card-header-modern d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-calendar3"></i> Pr&oacute;ximas Citas</h5>
                <a th:href="@{/portal/mis-citas}" class="btn btn-sm btn-modern btn-outline-primary">Ver todas</a>
            </div>
            <div class="card-body-modern">
                <div class="table-container">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>M&eacute;dico</th>
                                <th>Especialidad</th>
                                <th>Estado</th>
                                <th style="text-align:center;">Acci&oacute;n</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${proximasCitas}">
                                <td th:text="${#temporals.format(c.fechaCita, 'dd/MM/yyyy')}"></td>
                                <td th:text="${c.horaInicio}"></td>
                                <td th:text="${c.medico.nombreCompleto}"></td>
                                <td th:text="${c.especialidad.nombre}"></td>
                                <td>
                                    <span class="badge-estado"
                                          th:classappend="${c.estado.name() == 'PROGRAMADA'} ? 'badge-info' : (${c.estado.name() == 'CONFIRMADA'} ? 'badge-primary' : (${c.estado.name() == 'EN_TRIAGE'} ? 'badge-warning' : 'badge-proceso'))"
                                          th:text="${c.estado.name()}"></span>
                                </td>
                                <td style="text-align:center;">
                                    <form th:if="${c.estado.name() == 'PROGRAMADA' or c.estado.name() == 'CONFIRMADA'}"
                                          th:action="@{/portal/citas/{id}/cancelar(id=${c.idCita})}" method="post"
                                          onsubmit="return confirm('&iquest;Cancelar esta cita?')">
                                        <button type="submit" class="action-btn action-delete" title="Cancelar">
                                            <i class="bi bi-x-circle"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(proximasCitas)}">
                                <td colspan="6" class="table-empty">
                                    No tienes citas pr&oacute;ximas.
                                    <a th:href="@{/portal/agendar}">Agenda una aqu&iacute;</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header-paciente :: footer}"></footer>
</div>
</body>
</html>
