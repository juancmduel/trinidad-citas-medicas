<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Trinidad</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a1628 0%, #0d2444 40%, #0a2035 70%, #061220 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ── Fondo animado canvas ─────────────────────── */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Tarjeta login glassmorphism ──────────────── */
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            padding: 48px 42px;
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 42px;
            padding-bottom: 22px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .login-logo {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }

        .login-header h2 {
            color: #ffffff;
            font-weight: 700;
            margin: 8px 0 4px;
            font-size: 1.6rem;
        }

        .login-header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.88rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-of-type {
            margin-bottom: 40px;
        }

        .form-label {
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            margin-bottom: 10px;
            display: block;
        }

        .form-control {
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            color: #ffffff;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
        }

        .form-control::placeholder { 
            color: rgba(255,255,255,0.45); 
            font-weight: 500;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.18);
            border-color: #06b6d4;
            box-shadow: 0 0 0 4px rgba(6,182,212,0.25), inset 0 0 0 2px rgba(6,182,212,0.1);
            color: #ffffff;
            outline: none;
        }

        .form-control:hover:not(:focus) {
            border-color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.15);
        }

        .input-group-text {
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.25);
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #06b6d4;
            font-weight: 600;
            padding: 14px 18px;
            font-size: 1.05rem;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }

        .input-group:focus-within .input-group-text {
            border-color: #06b6d4;
            background: rgba(6,182,212,0.15);
            color: #00d4ff;
        }

        .btn-login {
            background: linear-gradient(135deg, #06b6d4 0%, #0ea5e9 100%);
            border: 2px solid rgba(6,182,212,0.4);
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            width: 100%;
            color: #ffffff;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
            box-shadow: 0 8px 24px rgba(6,182,212,0.45);
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(6,182,212,0.6);
            color: #ffffff;
            background: linear-gradient(135deg, #00d4ff 0%, #06b6d4 100%);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.88rem;
            color: rgba(255,255,255,0.45);
        }

        .login-footer a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .alert {
            border-radius: 12px;
            font-size: 0.95rem;
            border-left: 4px solid;
            padding: 14px 16px;
        }

        .alert-danger {
            background: rgba(239,68,68,0.2);
            border-color: #ef4444;
            border: 1.5px solid rgba(239,68,68,0.5);
            color: #fecaca;
        }

        .alert-success {
            background: rgba(34,197,94,0.2);
            border-color: #10b981;
            border: 1.5px solid rgba(34,197,94,0.5);
            color: #86efac;
        }

        .hint-box {
            display: none !important;
            visibility: hidden;
            height: 0;
            padding: 0;
            margin: 0;
            border: none;
        }

        .hint-box strong {
            display: block;
            margin-bottom: 8px;
            color: #06b6d4;
            font-weight: 700;
        }

        .hint-box code {
            background: rgba(6,182,212,0.25);
            color: #00ffff;
            padding: 3px 7px;
            border-radius: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Canvas fondo animado -->
    <canvas id="bg-canvas"></canvas>

    <div class="login-container">

        <!-- Header -->
        <div class="login-header">
            <div class="login-logo"><i class="bi bi-activity"></i></div>
            <h2>Trinidad</h2>
            <p>Sistema de Gestión de Citas Médicas</p>
        </div>

        <!-- Alertas -->
        <div th:if="${param.error}" class="alert alert-danger" style="margin-bottom:20px;">
            <i class="bi bi-exclamation-circle-fill"></i>
            Usuario o contraseña incorrectos
        </div>
        <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom:20px;">
            <i class="bi bi-check-circle-fill"></i>
            Sesión cerrada correctamente
        </div>

        <!-- Formulario -->
        <form th:action="@{/login}" method="post">
            <div style="margin-bottom: 22px;">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Ingresa tu usuario" required autofocus>
                </div>
            </div>

            <div style="margin-bottom: 38px;">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Ingresa tu contraseña" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <a th:href="@{/}"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
        </div>

    </div>

    <script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script>
    // ── Fondo animado médico ───────────────────────────────────────────────────
    (function () {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles, pulseLines, crosses;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            init();
        }

        function init() {
            particles = Array.from({ length: 70 }, () => ({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.8 + 0.4,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                alpha: Math.random() * 0.5 + 0.1,
                color: Math.random() > 0.5 ? '#3b82f6' : '#06b6d4'
            }));

            crosses = Array.from({ length: 12 }, () => ({
                x: Math.random() * W,
                y: Math.random() * H,
                size: Math.random() * 10 + 6,
                alpha: Math.random() * 0.15 + 0.04,
                rot: Math.random() * Math.PI,
                vrot: (Math.random() - 0.5) * 0.005,
                vy: (Math.random() - 0.5) * 0.15,
                vx: (Math.random() - 0.5) * 0.1
            }));

            pulseLines = Array.from({ length: 3 }, (_, i) => ({
                y: H * (0.25 + i * 0.25),
                offset: Math.random() * 200,
                speed: 0.8 + Math.random() * 0.5,
                amp: 18 + Math.random() * 12,
                color: i === 1 ? '#06b6d4' : '#3b82f6'
            }));
        }

        function drawCross(x, y, size, alpha, rot) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-size, 0); ctx.lineTo(size, 0);
            ctx.moveTo(0, -size); ctx.lineTo(0, size);
            ctx.stroke();
            ctx.restore();
        }

        function drawPulseLine(pl, t) {
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.strokeStyle = pl.color;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            const step = 6;
            for (let x = 0; x <= W; x += step) {
                const prog = (x + pl.offset + t * pl.speed * 40) % W;
                let y = pl.y;
                const cx = W * 0.35, pulse_w = 80;
                const relProg = ((prog - cx + W) % W);
                if (relProg < pulse_w) {
                    const p = relProg / pulse_w;
                    if (p < 0.2)        y += pl.amp * (p / 0.2);
                    else if (p < 0.35)  y += pl.amp * (1 - (p - 0.2) / 0.15 * 2);
                    else if (p < 0.5)   y -= pl.amp * 0.8 * ((p - 0.35) / 0.15);
                    else if (p < 0.65)  y -= pl.amp * 0.8 * (1 - (p - 0.5) / 0.15);
                    else if (p < 0.8)   y += pl.amp * 0.3 * ((p - 0.65) / 0.15);
                    else                y += pl.amp * 0.3 * (1 - (p - 0.8) / 0.2);
                }
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        let t = 0;
        function loop() {
            ctx.clearRect(0, 0, W, H);

            // Radial glow izquierda
            ctx.save();
            ctx.globalAlpha = 0.06;
            const g1 = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, W * 0.5);
            g1.addColorStop(0, '#3b82f6'); g1.addColorStop(1, 'transparent');
            ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
            ctx.restore();

            // Radial glow derecha
            ctx.save();
            ctx.globalAlpha = 0.05;
            const g2 = ctx.createRadialGradient(W * 0.75, H * 0.65, 0, W * 0.75, H * 0.65, W * 0.4);
            g2.addColorStop(0, '#06b6d4'); g2.addColorStop(1, 'transparent');
            ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);
            ctx.restore();

            pulseLines.forEach(pl => drawPulseLine(pl, t));

            // Partículas
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Líneas de conexión entre partículas cercanas
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 70) {
                        ctx.save();
                        ctx.globalAlpha = (1 - dist / 70) * 0.08;
                        ctx.strokeStyle = '#60a5fa';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }

            // Cruces médicas flotantes
            crosses.forEach(c => {
                c.x += c.vx; c.y += c.vy; c.rot += c.vrot;
                if (c.x < -20) c.x = W + 20; if (c.x > W + 20) c.x = -20;
                if (c.y < -20) c.y = H + 20; if (c.y > H + 20) c.y = -20;
                drawCross(c.x, c.y, c.size, c.alpha, c.rot);
            });

            t += 0.016;
            requestAnimationFrame(loop);
        }

        resize();
        loop();
        window.addEventListener('resize', resize);
    })();
    </script>
</body>
</html>
