<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Trinidad'">Recuperar Contrasena - Trinidad</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/trinidad.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <script>
        (function() {
            var t = localStorage.getItem('trinidad-theme');
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
</head>
<body>

<div class="login-split">

    <!-- Left: Image -->
    <div class="login-image-side">
        <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=1200&q=80"
             alt="Recuperar contrasena"
             loading="lazy">
        <div class="login-image-overlay"></div>
        <div class="login-image-content">
            <div class="login-image-badge">
                <i class="bi bi-shield-lock"></i> Recuperacion de Cuenta
            </div>
            <h2>¿Olvidaste tu contrasena?</h2>
            <p>No te preocupes, todos olvidamos. Ingresa tu correo y te enviaremos un enlace para que puedas crear una nueva contrasena.</p>
        </div>
    </div>

    <!-- Right: Form -->
    <div class="login-form-side">
        <div class="login-card" style="position:relative;">

            <button onclick="toggleTheme()" class="btn-theme-landing" title="Cambiar tema"
                    style="position:absolute;top:0;right:0;z-index:10;">
                <i id="themeIcon" class="bi bi-moon-fill"></i>
            </button>

            <div class="login-logo">
                <div class="logo-icon"><i class="bi bi-key" style="color:#fff;"></i></div>
                <h3>Recuperar Contrasena</h3>
                <p>Te enviaremos un enlace a tu correo</p>
            </div>

            <!-- Alerta de exito -->
            <div th:if="${ok}" class="alert-custom alert-success">
                <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${ok}"></span>
            </div>

            <form th:action="@{/olvide-password}" method="post">
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder=" " required autofocus>
                    <label for="email"><i class="bi bi-envelope-fill me-2"></i>Correo electronico</label>
                </div>

                <button type="submit" class="btn-login-submit mt-3">
                    <i class="bi bi-send"></i> Enviar Enlace
                </button>
            </form>

            <div class="login-divider"><span>— O —</span></div>

            <div class="login-links">
                <a th:href="@{/login}"><i class="bi bi-arrow-left"></i> Volver a iniciar sesion</a>
                <a th:href="@{/}"><i class="bi bi-house"></i> Ir al inicio</a>
            </div>

        </div>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>

<script>
(function() {
    var t = localStorage.getItem('trinidad-theme');
    var icon = document.getElementById('themeIcon');
    if (icon) {
        icon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    }
})();

function toggleTheme() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    var icon = document.getElementById('themeIcon');
    html.classList.add('theme-transitioning');
    if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('trinidad-theme', 'light');
        if (icon) icon.className = 'bi bi-moon-fill';
    } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('trinidad-theme', 'dark');
        if (icon) icon.className = 'bi bi-sun-fill';
    }
    setTimeout(function() { html.classList.remove('theme-transitioning'); }, 500);
}
</script>
</body>
</html>
