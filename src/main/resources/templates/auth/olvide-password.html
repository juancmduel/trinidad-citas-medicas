<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Trinidad'">Recuperar Contrasena - Trinidad</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo"><i class="bi bi-key"></i></div>
            <h2>Recuperar Contrasena</h2>
            <p>Ingresa tu email para recibir un enlace de recuperacion</p>
        </div>

        <div th:if="${ok}" class="alert alert-success" style="margin-bottom:20px;">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${ok}"></span>
        </div>

        <form th:action="@{/olvide-password}" method="post">
            <div style="margin-bottom: 22px;">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="correo@ejemplo.com" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-send"></i> Enviar Enlace
            </button>
        </form>

        <div class="login-footer">
            <a th:href="@{/login}"><i class="bi bi-arrow-left"></i> Volver a iniciar sesion</a>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/login-bg.js}"></script>
</body>
</html>
