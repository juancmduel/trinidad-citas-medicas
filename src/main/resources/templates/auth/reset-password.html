<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Trinidad'">Restablecer Contrasena - Trinidad</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo"><i class="bi bi-shield-lock"></i></div>
            <h2>Restablecer Contrasena</h2>
            <p>Ingresa tu nueva contrasena</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" style="margin-bottom:20px;">
            <i class="bi bi-exclamation-circle-fill"></i> <span th:text="${error}"></span>
        </div>

        <form th:if="${token != null}" th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div style="margin-bottom: 22px;">
                <label for="password" class="form-label">Nueva Contrasena</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Min. 8 caracteres" required minlength="8">
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-check-lg"></i> Restablecer Contrasena
            </button>
        </form>

        <div class="login-footer" th:if="${token == null}">
            <a th:href="@{/olvide-password}"><i class="bi bi-arrow-left"></i> Solicitar nuevo enlace</a>
            <br>
            <a th:href="@{/login}"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesion</a>
        </div>

        <div class="login-footer" th:if="${token != null}">
            <a th:href="@{/login}"><i class="bi bi-arrow-left"></i> Volver a iniciar sesion</a>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/login-bg.js}"></script>
</body>
</html>
