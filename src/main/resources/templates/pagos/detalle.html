<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Pago')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-credit-card"></i>Detalle del Pago</h1>
                <p>Información completa del pago registrado</p>
            </div>
            <span class="badge-estado-lg"
                  th:classappend="${pago.estado == 'PAGADO'} ? 'be-pagado' : (${pago.estado == 'PENDIENTE'} ? 'be-pendiente' : 'be-anulado')"
                  th:text="${pago.estado == 'PAGADO'} ? 'Pagado' : (${pago.estado == 'PENDIENTE'} ? 'Pendiente' : 'Anulado')"></span>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-cash-coin"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Información del Pago</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Monto</span>
                                    <span class="df-value df-value-accent" style="font-size:1.2rem;">
                                        S/. <span th:text="${#numbers.formatDecimal(pago.monto, 1, 2, 'DEFAULT')}">0.00</span>
                                    </span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Método de Pago</span>
                                    <span class="df-value" th:text="${pago.metodoPago}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">N° Comprobante</span>
                                    <span class="df-value" th:text="${pago.nroComprobante ?: '-'}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Tipo Comprobante</span>
                                    <span class="df-value" th:text="${pago.tipoComprobante ?: '-'}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Fecha Registro</span>
                                    <span class="df-value" th:text="${#temporals.format(pago.fechaRegistro, 'dd/MM/yyyy HH:mm')}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6" th:if="${pago.fechaPago}">
                                <div class="detail-field">
                                    <span class="df-label">Fecha de Pago</span>
                                    <span class="df-value" th:text="${#temporals.format(pago.fechaPago, 'dd/MM/yyyy HH:mm')}">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-person-fill"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Paciente</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="detail-field">
                            <span class="df-label">Nombre</span>
                            <span class="df-value" style="font-size:1rem;"
                                  th:text="${pago.cita?.paciente?.apellidoPaterno + ' ' + pago.cita?.paciente?.apellidoMaterno + ', ' + pago.cita?.paciente?.nombres}">-</span>
                        </div>
                        <div class="detail-field" th:if="${pago.cita?.paciente?.dni}">
                            <span class="df-label">DNI</span>
                            <span class="df-value" th:text="${pago.cita?.paciente?.dni}">-</span>
                        </div>
                    </div>
                </div>

                <div class="detail-actions">
                    <a th:href="@{/pagos/editar/{id}(id=${pago.idPago})}" class="btn-editar w-100 text-center mb-2" style="padding:12px;">
                        <i class="bi bi-pencil"></i>Editar Pago
                    </a>
                    <form th:action="@{/pagos/eliminar/{id}(id=${pago.idPago})}" method="post" onsubmit="return confirm('¿Eliminar este pago?')">
                        <button type="submit" class="btn-eliminar w-100 mb-2" style="padding:12px;">
                            <i class="bi bi-trash3"></i>Eliminar
                        </button>
                    </form>
                    <a th:href="@{/pagos}" class="btn-volver w-100 text-center">
                        <i class="bi bi-arrow-left"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>

        

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
