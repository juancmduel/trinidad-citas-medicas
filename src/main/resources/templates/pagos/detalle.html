<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Pago')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-credit-card me-2" style="color:#06b6d4;"></i>Detalle del Pago
            </h1>
        </div>

        <div th:if="${pago != null}" class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between">
                <h5><i class="bi bi-cash-coin"></i> Información del Pago</h5>
                <span th:classappend="${pago.estado == 'PAGADO' ? 'badge-success' : pago.estado == 'PENDIENTE' ? 'badge-warning' : 'badge-danger'}" class="badge-status" th:text="${pago.estado}"></span>
            </div>
            <div class="p-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Monto</label>
                        <p style="font-weight:700;color:#06b6d4;">S/. <span th:text="${#numbers.formatDecimal(pago.monto, 1, 2, 'DEFAULT')}">0.00</span></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Método de Pago</label>
                        <p th:text="${pago.metodoPago}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Nº Comprobante</label>
                        <p th:text="${pago.nroComprobante ?: '-'}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Tipo Comprobante</label>
                        <p th:text="${pago.tipoComprobante ?: '-'}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Registro</label>
                        <p th:text="${#temporals.format(pago.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>
                    <div class="col-md-4" th:if="${pago.fechaPago}">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Pago</label>
                        <p th:text="${#temporals.format(pago.fechaPago, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <a th:href="@{/pagos/editar/{id}(id=${pago.idPago})}" class="btn-professional btn-outline-prof">
                <i class="bi bi-pencil"></i> Editar
            </a>
            <form th:action="@{/pagos/eliminar/{id}(id=${pago.idPago})}" method="post" style="display:inline;">
                <button type="submit" class="btn-professional btn-danger-prof"
                        onclick="return confirm('¿Eliminar este pago?')">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
            </form>
            <a href="/trinidad/pagos" class="btn-professional btn-outline-prof">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
