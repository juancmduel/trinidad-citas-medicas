<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-hospital"></i>Diagnósticos CIE-10</h1>
                <p>Catálogo de Diagnósticos Clínicos clasificados por CIE-10</p>
            </div>
            <a th:href="@{/diagnosticos/nuevo}" class="btn-nuevo">
                <i class="bi bi-plus-lg"></i>Nuevo Diagnóstico
            </a>
        </div>
        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>Código CIE-10</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th style="text-align:center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="diagnostico : ${diagnosticos}">
                        <td><strong th:text="${diagnostico.codigo}"></strong></td>
                        <td th:text="${diagnostico.descripcion}"></td>
                        <td th:text="${diagnostico.capitulo}"></td>
                        <td style="text-align:center;">
                            <div class="action-group">
                                <a th:href="@{/diagnosticos/{id}(id=${diagnostico.codigo})}" class="action-btn action-view" title="Ver"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/diagnosticos/editar/{id}(id=${diagnostico.codigo})}" class="action-btn action-edit" title="Editar"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/diagnosticos/eliminar/{id}(id=${diagnostico.codigo})}" method="post" style="display:inline;">
                                    <button type="submit" class="action-btn action-delete" title="Eliminar" onclick="return confirm('¿Eliminar este Diagnóstico?')"><i class="bi bi-trash"></i></button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(diagnosticos)}">
                        <td colspan="4" class="table-empty">No hay Diagnósticos registrados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
