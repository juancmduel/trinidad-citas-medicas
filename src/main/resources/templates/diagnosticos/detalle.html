<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Diagnóstico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-hospital"></i>Detalle del Diagnóstico</h1>
                <p>Información completa del diagnóstico CIE-10</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/diagnosticos/editar/{id}(id=${diagnostico.codigo})}" class="action-btn action-edit" title="Editar">
                    <i class="bi bi-pencil"></i>
                </a>
                <form th:action="@{/diagnosticos/eliminar/{id}(id=${diagnostico.codigo})}" method="post" style="display:inline;">
                    <button type="submit" class="action-btn action-delete" title="Eliminar" onclick="return confirm('¿Eliminar este Diagnóstico?')">
                        <i class="bi bi-trash"></i>
                    </button>
                </form>
            </div>
        </div>
        <div th:if="${diagnostico != null}" class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-info-circle-fill"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Información del Diagnóstico</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-4">
                                <div class="detail-field">
                                    <span class="df-label">Código CIE-10</span>
                                    <span class="df-value df-value-accent" th:text="${diagnostico.codigo}">-</span>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="detail-field">
                                    <span class="df-label">Capítulo</span>
                                    <span class="df-value" th:text="${diagnostico.capitulo ?: 'No especificado'}">-</span>
                                </div>
                            </div>
                            <div class="col-12" th:if="${diagnostico.descripcion}">
                                <div class="detail-field">
                                    <span class="df-label">Descripción</span>
                                    <span class="df-value" th:text="${diagnostico.descripcion}">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="detail-actions">
                    <a th:href="@{/diagnosticos}" class="btn-volver w-100 text-center">
                        <i class="bi bi-arrow-left"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
