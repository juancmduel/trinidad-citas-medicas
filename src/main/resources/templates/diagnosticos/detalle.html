<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Diagnóstico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-hospital me-2" style="color:#06b6d4;"></i>Detalle del Diagnóstico
            </h1>
        </div>

        <div th:if="${diagnostico != null}" class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between align-items-center">
                <h5><i class="bi bi-info-circle"></i> Información del Diagnóstico</h5>
                <div class="d-flex gap-2">
                    <a th:href="@{/diagnosticos/editar/{id}(id=${diagnostico.codigo})}" class="btn-editar">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <form th:action="@{/diagnosticos/eliminar/{id}(id=${diagnostico.codigo})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-eliminar"
                                onclick="return confirm('¿Eliminar este diagnóstico?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                    </form>
                </div>
            </div>
            <div class="p-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Código CIE-10</label>
                        <p style="font-weight:700;color:#06b6d4;" th:text="${diagnostico.codigo}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Capítulo</label>
                        <p style="font-weight:700;" th:text="${diagnostico.capitulo ?: 'No especificado'}"></p>
                    </div>
                    <div class="col-12" th:if="${diagnostico.descripcion}">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Descripción</label>
                        <p th:text="${diagnostico.descripcion}"></p>
                    </div>
                </div>
            </div>
        </div>

        <a href="/trinidad/diagnosticos" class="btn-ver">
            <i class="bi bi-arrow-left"></i> Volver
        </a>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
