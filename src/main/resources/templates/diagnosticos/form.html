<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Diagnóstico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-hospital"></i>
                    <span th:text="${diagnostico.codigo != null} ? 'Editar Diagnóstico' : 'Nuevo Diagnóstico'">Diagnóstico</span>
                </h1>
                <p>Formulario de registro de diagnóstico CIE-10</p>
            </div>
            <a th:href="@{/diagnosticos}" class="btn-volver">
                <i class="bi bi-arrow-left"></i>Volver
            </a>
        </div>
        <form th:action="@{/diagnosticos/guardar}" method="post">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-info-circle-fill"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Datos del Diagnóstico</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Información principal del diagnóstico CIE-10</p>
                            </div>
                        </div>
                        <input type="hidden" name="codigo" th:value="${diagnostico.codigo}">
                        <div class="row g-3">
                            <div class="col-md-6 form-field">
                                <label>Código CIE-10 <span class="required">*</span></label>
                                <input type="text" name="codigo" class="form-input-professional"
                                       th:value="${diagnostico.codigo}"
                                       th:readonly="${diagnostico.codigo != null}"
                                       placeholder="Ej: A00" maxlength="10" required>
                            </div>
                            <div class="col-md-6 form-field">
                                <label>Capítulo / Categoría</label>
                                <input type="text" name="capitulo" class="form-input-professional"
                                       th:value="${diagnostico.capitulo}"
                                       placeholder="Ej: Enfermedades Infecciosas" maxlength="80">
                            </div>
                        </div>
                        <div class="form-field mt-3">
                            <label>Descripción <span class="required">*</span></label>
                            <textarea name="descripcion" class="form-input-professional" rows="4"
                                      th:text="${diagnostico.descripcion}"
                                      placeholder="Descripción completa del Diagnóstico..." required></textarea>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="form-section-card">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="fs-icon"><i class="bi bi-lightning-fill"></i></div>
                            <div>
                                <h5 class="mb-1" style="font-weight:700;">Acciones</h5>
                                <p style="color:var(--text-muted);font-size:13px;margin:0;">Finaliza o descarta los cambios</p>
                            </div>
                        </div>
                        <button type="submit" class="btn-guardar w-100 mb-2" style="justify-content:center;padding:12px;">
                            <i class="bi bi-check-circle"></i> Guardar
                        </button>
                        <a th:href="@{/diagnosticos}" class="btn-volver w-100 text-center" style="justify-content:center;padding:12px;">
                            <i class="bi bi-x-circle"></i>Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
