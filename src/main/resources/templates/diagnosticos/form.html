<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Diagnóstico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-hospital me-2" style="color:#06b6d4;"></i>
                <span th:text="${diagnostico.codigo != null} ? 'Editar Diagnóstico' : 'Nuevo Diagnóstico'">Diagnóstico</span>
            </h1>
        </div>

        <div class="card-professional">
            <div class="card-header-professional">
                <h5><i class="bi bi-pencil-square"></i> Formulario de Diagnóstico</h5>
            </div>
            <div class="p-4">
                <form th:action="@{/diagnosticos/guardar}" method="post">
                    <input type="hidden" name="codigo" th:value="${diagnostico.codigo}">

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Código CIE-10 <span style="color:#ef4444;">*</span></label>
                            <input type="text" name="codigo" class="form-control"
                                   th:value="${diagnostico.codigo}"
                                   th:readonly="${diagnostico.codigo != null}"
                                   placeholder="Ej: A00" maxlength="10" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Capítulo / Categoría</label>
                            <input type="text" name="capitulo" class="form-control"
                                   th:value="${diagnostico.capitulo}"
                                   placeholder="Ej: Enfermedades Infecciosas" maxlength="80">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label class="form-label">Descripción <span style="color:#ef4444;">*</span></label>
                            <textarea name="descripcion" class="form-control" rows="4"
                                      th:text="${diagnostico.descripcion}"
                                      placeholder="Descripción completa del diagnóstico..." required></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn-professional btn-primary-prof">
                            <i class="bi bi-save"></i> Guardar
                        </button>
                        <a href="/trinidad/diagnosticos" class="btn-professional btn-outline-prof">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
