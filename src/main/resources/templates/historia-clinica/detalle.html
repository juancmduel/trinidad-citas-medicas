<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Historia Clínica')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-journal-medical me-2" style="color:#06b6d4;"></i>Historia Clínica
            </h1>
        </div>

        <div th:if="${historia != null}" class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between align-items-center">
                <h5><i class="bi bi-file-person"></i> Datos del Paciente</h5>
                <a th:href="@{/historia-clinica/editar/{id}(id=${historia.idHistoria})}" class="btn-editar">
                    <i class="bi bi-pencil"></i> Editar
                </a>
            </div>
            <div class="p-4">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Nº Historia</label>
                        <p style="font-weight:700;color:#06b6d4;" th:text="${historia.nroHistoria}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Paciente</label>
                        <p th:text="${historia.paciente.apellidoPaterno + ' ' + historia.paciente.nombres}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">DNI</label>
                        <p th:text="${historia.paciente.dni}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Apertura</label>
                        <p th:text="${#temporals.format(historia.fechaApertura, 'dd/MM/yyyy')}"></p>
                    </div>
                    <div class="col-12" th:if="${historia.observaciones}">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Observaciones</label>
                        <p th:text="${historia.observaciones}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a href="/trinidad/historia-clinica" class="btn-ver">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
