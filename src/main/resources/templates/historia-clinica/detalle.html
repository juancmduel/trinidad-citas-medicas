<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Historia Clínica')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-journal-medical"></i>Historia Clínica</h1>
                <p>Detalle completo de la historia clínica del paciente</p>
            </div>
            <span class="badge-estado-lg"
                  th:classappend="${historia.activo == 1} ? 'be-activa' : 'be-inactiva'"
                  th:text="${historia.activo == 1} ? 'Activa' : 'Inactiva'"></span>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-file-person-fill"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Datos del Paciente</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">N° Historia</span>
                                    <span class="df-value df-value-accent" th:text="${historia.nroHistoria}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Paciente</span>
                                    <span class="df-value" th:text="${historia.paciente?.apellidoPaterno + ' ' + historia.paciente?.apellidoMaterno + ', ' + historia.paciente?.nombres}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">DNI</span>
                                    <span class="df-value" th:text="${historia.paciente?.dni ?: '-'}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Fecha Apertura</span>
                                    <span class="df-value" th:text="${#temporals.format(historia.fechaApertura, 'dd/MM/yyyy')}">-</span>
                                </div>
                            </div>
                            <div class="col-12" th:if="${historia.observaciones}">
                                <div class="detail-field">
                                    <span class="df-label">Observaciones</span>
                                    <span class="df-value" th:text="${historia.observaciones}">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="detail-actions">
                    <a th:href="@{/historia-clinica/editar/{id}(id=${historia.idHistoria})}" class="action-btn w-100">
                        <i class="bi bi-pencil"></i>Editar Historia
                    </a>
                    <form th:action="@{/historia-clinica/eliminar/{id}(id=${historia.idHistoria})}" method="post" style="display:block;" onsubmit="return confirm('¿Eliminar esta historia clínica?')">
                        <button type="submit" class="action-btn btn-danger-outline w-100" style="padding:12px;border-radius:10px;font-weight:600;">
                            <i class="bi bi-trash3"></i>Eliminar
                        </button>
                    </form>
                    <a th:href="@{/historia-clinica}" class="btn-volver w-100 text-center">
                        <i class="bi bi-arrow-left"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>

        

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
