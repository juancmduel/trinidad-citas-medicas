<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Historia Clínica')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <div class="container-xl">
            <div class="page-header">
                <div class="row align-items-center">
                    <div class="col">
                        <h2 class="page-title"><i class="fa-solid fa-file-medical"></i> Historia Clínica</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="page-wrapper">
            <div class="container-xl">
                <div class="row">
                    <div class="col-12">
                        <div th:if="${ok}" class="alert alert-success alert-dismissible" th:text="${ok}"></div>
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <span>Historias Clínicas registradas</span>
                                <a href="/trinidad/historia-clinica/nueva" class="btn btn-primary btn-sm">
                                    <i class="fa-solid fa-plus"></i> Nueva Historia
                                </a>
                            </div>
                            <div class="table-responsive">
                                <table class="table card-table table-vcenter">
                                    <thead>
                                        <tr>
                                            <th>N° Historia</th>
                                            <th>Paciente</th>
                                            <th>DNI</th>
                                            <th>Fecha Apertura</th>
                                            <th>Estado</th>
                                            <th>Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:if="${historias.isEmpty()}">
                                            <td colspan="6" class="text-center">No hay historias clínicas registradas</td></tr>
                                        <tr th:each="h : ${historias}">
                                            <td th:text="${h.nroHistoria}"></td>
                                            <td th:text="${h.paciente != null ? h.paciente.nombres + ' ' + h.paciente.apellidoPaterno : '-'}"></td>
                                            <td th:text="${h.paciente != null ? h.paciente.dni : '-'}"></td>
                                            <td th:text="${h.fechaApertura}"></td>
                                            <td>
                                                <span th:if="${h.activo == 1}" class="badge bg-success">Activa</span>
                                                <span th:if="${h.activo != 1}" class="badge bg-secondary">Inactiva</span>
                                            </td>
                                            <td>
                                                <a th:href="@{/historia-clinica/{id}(id=${h.idHistoria})}" class="btn-ver">
                                                    <i class="fa-solid fa-eye"></i>
                                                </a>
                                                <a th:href="@{/historia-clinica/editar/{id}(id=${h.idHistoria})}" class="btn-editar">
                                                    <i class="fa-solid fa-pencil"></i>
                                                </a>
                                                <form th:action="@{/historia-clinica/eliminar/{id}(id=${h.idHistoria})}" method="post" style="display:inline;">
                                                    <button type="submit" class="btn-eliminar"
                                                            onclick="return confirm('¿Eliminar esta historia clínica?')">
                                                        <i class="fa-solid fa-trash"></i>
                                                    </button>
                                                </form>
                                            </div></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
