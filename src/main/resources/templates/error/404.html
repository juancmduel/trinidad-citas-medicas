<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Error 404')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div class="d-flex align-items-center justify-content-center" style="min-height:80vh;">
        <div class="text-center p-5">
            <div style="font-size:5rem;color:var(--warning);margin-bottom:1rem;">
                <i class="bi bi-emoji-frown"></i>
            </div>
            <h1 style="font-size:4rem;font-weight:800;color:var(--warning);margin:0;">404</h1>
            <h2 style="font-size:1.5rem;font-weight:700;margin:0.5rem 0 1rem;">Página no encontrada</h2>
            <p style="color:var(--text-muted);max-width:420px;margin:0 auto 2rem;">
                La página que buscas no existe o ha sido movida.
            </p>
            <div class="d-flex gap-3 justify-content-center">
                <a th:href="@{/dashboard}" class="btn-nuevo">
                    <i class="bi bi-speedometer2"></i>Ir al Dashboard
                </a>
                <a th:href="@{/}" class="btn-ver">
                    <i class="bi bi-house"></i>Volver al inicio
                </a>
            </div>
        </div>
    </div>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
