<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Acceso Denegado')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div class="d-flex align-items-center justify-content-center" style="min-height:80vh;">
        <div class="text-center p-5">
            <div style="font-size:5rem;color:#ef4444;margin-bottom:1rem;">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1 style="font-size:4rem;font-weight:800;color:#ef4444;margin:0;">403</h1>
            <h2 style="font-size:1.5rem;font-weight:700;margin:0.5rem 0 1rem;">Acceso Denegado</h2>
            <p style="color:rgba(255,255,255,0.5);max-width:420px;margin:0 auto 2rem;">
                No tienes permisos para acceder a esta sección.
                Contacta al administrador si crees que esto es un error.
            </p>
            <div class="d-flex gap-3 justify-content-center">
                <a th:href="@{/dashboard}" class="btn-nuevo">
                    <i class="bi bi-speedometer2"></i>Ir al Dashboard
                </a>
                <a th:href="@{/logout}" class="btn-ver">
                    <i class="bi bi-box-arrow-right"></i>Cerrar Sesión
                </a>
            </div>
        </div>
    </div>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
