<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Médicos')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-person-badge"></i>Médicos</h1>
                <p>Personal Médico registrado en el sistema</p>
            </div>
            <a th:href="@{/medicos/nuevo}" class="btn-nuevo">
                <i class="bi bi-plus-circle-fill"></i>Nuevo Médico
            </a>
        </div>

        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle-fill"></i><span th:text="${ok}"></span>
        </div>

        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>CMP</th>
                        <th>Nombre Completo</th>
                        <th>Especialidad</th>
                        <th>Consultorio</th>
                        <th>Teléfono</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${medicos}">
                        <td>
                            <span class="badge-estado badge-estado-primary" th:text="${m.cmp}"></span>
                        </td>
                        <td>
                            <strong th:text="${m.apellidoPaterno + ' ' + m.nombres}"></strong>
                        </td>
                        <td>
                            <span class="badge-estado badge-estado-primary" th:text="${m.especialidadNombre ?: '-'}"></span>
                        </td>
                        <td th:text="${m.consultorio ?: '-'}"></td>
                        <td th:text="${m.telefono ?: '-'}"></td>
                        <td>
                            <span th:if="${m.activo == 1}" class="badge-estado badge-estado-success">Activo</span>
                            <span th:unless="${m.activo == 1}" class="badge-estado badge-estado-danger">Inactivo</span>
                        </td>
                        <td><div class="acciones-tabla" style="justify-content:flex-end;">
                            <a th:href="@{/medicos/{id}(id=${m.idMedico})}" class="btn-ver" title="Ver"><i class="bi bi-eye"></i></a>
                            <a th:href="@{/medicos/editar/{id}(id=${m.idMedico})}" class="btn-editar" title="Editar"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/medicos/eliminar/{id}(id=${m.idMedico})}" method="post" class="d-inline">
                                <button type="submit" class="btn-eliminar" title="Eliminar"
                                        onclick="return confirm('¿Eliminar este Médico?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div></td></tr>
                    <tr th:if="${#lists.isEmpty(medicos)}">
                        <td colspan="7" class="table-empty">
                            <i class="bi bi-person-badge"></i>
                            <p>No hay Médicos registrados</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
