<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Médico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${medico.idMedico != null} ? 'Editar Médico' : 'Nuevo Médico'">Médico</h1>
                <p class="page-subtitle">Gestione la información del médico en el sistema</p>
            </div>
            <a th:href="@{/medicos}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i>Volver</a>
        </div>

        <div class="form-container">
            <div class="form-header">
                <i class="bi bi-person-badge"></i>
                <h3>Información del Médico</h3>
            </div>

            <form th:action="@{/medicos/guardar}" method="post" novalidate>
                <input type="hidden" th:name="idMedico" th:value="${medico.idMedico}">

                <!-- Sección 1: Datos de Usuario y Especialidad -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="usuarioId" class="required">Usuario</label>
                        <select id="usuarioId" name="usuarioId" class="form-select" required>
                            <option value="">Seleccionar usuario...</option>
                            <option th:each="u : ${usuarios}" th:value="${u.idUsuario}"
                                    th:text="${u.username}"
                                    th:selected="${medico.usuario != null and medico.usuario.idUsuario == u.idUsuario}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="especialidadId" class="required">Especialidad</label>
                        <select id="especialidadId" name="especialidadId" class="form-select" required>
                            <option value="">Seleccionar especialidad...</option>
                            <option th:each="e : ${especialidades}" th:value="${e.idEspecialidad}"
                                    th:text="${e.nombre}"
                                    th:selected="${medico.especialidad != null and medico.especialidad.idEspecialidad == e.idEspecialidad}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- Sección 2: Datos Profesionales -->
                <div class="form-section">
                    <div class="form-header">
                        <i class="bi bi-briefcase"></i>
                        <h3>Datos Profesionales</h3>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cmp" class="required">CMP (Colegiatura Médica)</label>
                            <input type="text" id="cmp" name="cmp" class="form-control"
                                   th:value="${medico.cmp}"
                                   placeholder="CMP-000000" maxlength="15" required>
                        </div>
                        <div class="form-group">
                            <label for="dni" class="required">DNI</label>
                            <input type="text" id="dni" name="dni" class="form-control"
                                   th:value="${medico.dni}"
                                   placeholder="12345678" maxlength="8" required pattern="^[0-9]{8}$">
                        </div>
                        <div class="form-group">
                            <label for="consultorio">Consultorio</label>
                            <input type="text" id="consultorio" name="consultorio" class="form-control"
                                   th:value="${medico.consultorio}"
                                   placeholder="Consultorio 101" maxlength="20">
                        </div>
                    </div>
                </div>

                <!-- Sección 3: Datos Personales -->
                <div class="form-section">
                    <div class="form-header">
                        <i class="bi bi-person"></i>
                        <h3>Datos Personales</h3>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombres" class="required">Nombres</label>
                            <input type="text" id="nombres" name="nombres" class="form-control"
                                   th:value="${medico.nombres}"
                                   placeholder="Juan Carlos" maxlength="80" required>
                        </div>
                        <div class="form-group">
                            <label for="apellidoPaterno" class="required">Apellido Paterno</label>
                            <input type="text" id="apellidoPaterno" name="apellidoPaterno" class="form-control"
                                   th:value="${medico.apellidoPaterno}"
                                   placeholder="Rodríguez" maxlength="50" required>
                        </div>
                        <div class="form-group">
                            <label for="apellidoMaterno">Apellido Materno</label>
                            <input type="text" id="apellidoMaterno" name="apellidoMaterno" class="form-control"
                                   th:value="${medico.apellidoMaterno}"
                                   placeholder="García" maxlength="50">
                        </div>
                    </div>
                </div>

                <!-- Sección 4: Contacto -->
                <div class="form-section">
                    <div class="form-header">
                        <i class="bi bi-telephone"></i>
                        <h3>Información de Contacto</h3>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" name="telefono" class="form-control"
                                   th:value="${medico.telefono}"
                                   placeholder="+51 987 654 321" maxlength="15">
                        </div>
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" name="email" class="form-control"
                                   th:value="${medico.email}"
                                   placeholder="medico@hospital.com" maxlength="120">
                        </div>
                    </div>
                </div>

                <!-- Sección 5: Estado -->
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="activo">Estado de Cuenta</label>
                            <select id="activo" name="activo" class="form-select">
                                <option value="1" th:selected="${medico.activo == 1}">✓ Activo</option>
                                <option value="0" th:selected="${medico.activo == 0}">✗ Inactivo</option>
                            </select>
                            <div class="form-text">El médico podrá recibir citas solo si está activo</div>
                        </div>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${medico.idMedico != null} ? 'Guardar Cambios' : 'Registrar Médico'"></span>
                    </button>
                    <a th:href="@{/medicos}" class="btn btn-secondary btn-lg">
                        <i class="bi bi-x-circle"></i>
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
