<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Médico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${medico.idMedico != null} ? 'Editar Médico' : 'Nuevo Médico'">Médico</h1>
                <p class="page-subtitle">Gestione la información del médico en el sistema</p>
            </div>
            <a th:href="@{/medicos}" class="btn-volver"><i class="bi bi-arrow-left"></i>Volver</a>
        </div>

        <div th:if="${error}" class="alert-professional alert-danger-prof">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/medicos/guardar}" method="post" novalidate>
            <input type="hidden" th:name="idMedico" th:value="${medico.idMedico}">

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-person-badge"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Información del Médico</span>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="usuarioId"><span class="required">*</span>Usuario</label>
                            <select id="usuarioId" name="usuarioId" class="form-select-professional" required>
                                <option value="">Seleccionar usuario...</option>
                                <option th:each="u : ${usuarios}" th:value="${u.idUsuario}"
                                        th:text="${u.username}"
                                        th:selected="${medico.usuario != null and medico.usuario.idUsuario == u.idUsuario}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="especialidadId"><span class="required">*</span>Especialidad</label>
                            <select id="especialidadId" name="especialidadId" class="form-select-professional" required>
                                <option value="">Seleccionar especialidad...</option>
                                <option th:each="e : ${especialidades}" th:value="${e.idEspecialidad}"
                                        th:text="${e.nombre}"
                                        th:selected="${medico.especialidad != null and medico.especialidad.idEspecialidad == e.idEspecialidad}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-briefcase"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Datos Profesionales</span>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="form-field">
                            <label for="cmp"><span class="required">*</span>CMP (Colegiatura Médica)</label>
                            <input type="text" id="cmp" name="cmp" class="form-input-professional"
                                   th:value="${medico.cmp}" placeholder="CMP-000000" maxlength="15" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-field">
                            <label for="dni"><span class="required">*</span>DNI</label>
                            <input type="text" id="dni" name="dni" class="form-input-professional"
                                   th:value="${medico.dni}" placeholder="12345678" maxlength="8" required pattern="^[0-9]{8}$">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-field">
                            <label for="consultorio">Consultorio</label>
                            <input type="text" id="consultorio" name="consultorio" class="form-input-professional"
                                   th:value="${medico.consultorio}" placeholder="Consultorio 101" maxlength="20">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-person"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Datos Personales</span>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="form-field">
                            <label for="nombres"><span class="required">*</span>Nombres</label>
                            <input type="text" id="nombres" name="nombres" class="form-input-professional"
                                   th:value="${medico.nombres}" placeholder="Juan Carlos" maxlength="80" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-field">
                            <label for="apellidoPaterno"><span class="required">*</span>Apellido Paterno</label>
                            <input type="text" id="apellidoPaterno" name="apellidoPaterno" class="form-input-professional"
                                   th:value="${medico.apellidoPaterno}" placeholder="Rodríguez" maxlength="50" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-field">
                            <label for="apellidoMaterno">Apellido Materno</label>
                            <input type="text" id="apellidoMaterno" name="apellidoMaterno" class="form-input-professional"
                                   th:value="${medico.apellidoMaterno}" placeholder="García" maxlength="50">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-telephone"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Información de Contacto</span>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" name="telefono" class="form-input-professional"
                                   th:value="${medico.telefono}" placeholder="+51 987 654 321" maxlength="15">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" name="email" class="form-input-professional"
                                   th:value="${medico.email}" placeholder="medico@hospital.com" maxlength="120">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-toggle-on"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Estado de Cuenta</span>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="activo">Estado</label>
                            <select id="activo" name="activo" class="form-select-professional">
                                <option value="1" th:selected="${medico.activo == 1}">✓ Activo</option>
                                <option value="0" th:selected="${medico.activo == 0}">✗ Inactivo</option>
                            </select>
                            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:6px;">
                                El médico podrá recibir citas solo si está activo
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-guardar">
                    <i class="bi bi-check-circle"></i>
                    <span th:text="${medico.idMedico != null} ? 'Guardar Cambios' : 'Registrar Médico'"></span>
                </button>
                <a th:href="@{/medicos}" class="btn-volver">
                    <i class="bi bi-x-circle"></i>Cancelar
                </a>
            </div>
        </form>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
