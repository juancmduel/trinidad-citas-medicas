<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Médico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-person-fill-check me-2" style="color:#06b6d4;"></i>Información del Médico
            </h1>
        </div>

        <div th:if="${medico != null}" class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between">
                <h5><i class="bi bi-person-badge"></i></h5>
                <div class="d-flex gap-2">
                    <a th:href="@{/medicos/editar/{id}(id=${medico.idMedico})}" class="btn-editar">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <form th:action="@{/medicos/eliminar/{id}(id=${medico.idMedico})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-eliminar"
                                onclick="return confirm('¿Eliminar este médico?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                    </form>
                </div>
            </div>
            <div class="p-4">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Nombre Completo</label>
                        <p style="font-weight:700;color:#06b6d4;" th:text="${medico.nombreCompleto}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">DNI</label>
                        <p th:text="${medico.dni}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">CMP</label>
                        <p th:text="${medico.cmp}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Especialidad</label>
                        <p th:text="${medico.especialidad.nombre}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Consultorio</label>
                        <p th:text="${medico.consultorio ?: '-'}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Teléfono</label>
                        <p th:text="${medico.telefono ?: '-'}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Email</label>
                        <p th:text="${medico.email ?: '-'}"></p>
                    </div>
                    <div class="col-md-3">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Estado</label>
                        <p>
                            <span th:if="${medico.activo == 1}" class="badge-status badge-success">Activo</span>
                            <span th:unless="${medico.activo == 1}" class="badge-status badge-danger">Inactivo</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <a href="/trinidad/medicos" class="btn-ver">
            <i class="bi bi-arrow-left"></i> Volver
        </a>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
