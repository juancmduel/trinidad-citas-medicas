<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Médico')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-person-fill-check"></i>Información del Médico</h1>
                <p>Detalle del profesional médico</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/medicos}" class="btn-volver">
                    <i class="bi bi-arrow-left"></i>Volver
                </a>
            </div>
        </div>

        <div th:if="${medico != null}" class="detail-card mb-4">
            <div class="detail-card-head">
                <span class="dch-icon"><i class="bi bi-person-badge"></i></span>
                <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Datos del Médico</span>
                <div class="ms-auto d-flex gap-2">
                    <a th:href="@{/medicos/editar/{id}(id=${medico.idMedico})}" class="btn-editar">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <form th:action="@{/medicos/eliminar/{id}(id=${medico.idMedico})}" method="post" class="d-inline">
                        <button type="submit" class="btn-eliminar"
                                onclick="return confirm('¿Eliminar este Médico?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                    </form>
                </div>
            </div>
            <div class="detail-card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Nombre Completo</span>
                            <span class="df-value df-value-accent" th:text="${medico.nombreCompleto}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">DNI</span>
                            <span class="df-value" th:text="${medico.dni}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">CMP</span>
                            <span class="df-value" th:text="${medico.cmp}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Especialidad</span>
                            <span class="df-value" th:text="${medico.especialidad.nombre}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Consultorio</span>
                            <span class="df-value" th:text="${medico.consultorio ?: '-'}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Teléfono</span>
                            <span class="df-value" th:text="${medico.telefono ?: '-'}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Email</span>
                            <span class="df-value" th:text="${medico.email ?: '-'}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Estado</span>
                            <span class="df-value">
                                <span th:if="${medico.activo == 1}" class="badge-estado badge-estado-success">Activo</span>
                                <span th:unless="${medico.activo == 1}" class="badge-estado badge-estado-danger">Inactivo</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
