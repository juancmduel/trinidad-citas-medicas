<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <div class="mb-4 d-flex align-items-center justify-content-between">
            <div>
                <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                    <i class="bi bi-calendar-check me-2" style="color:#06b6d4;"></i>Detalle de Cita
                </h1>
                <p style="color:rgba(255,255,255,0.5);font-size:13px;">
                    Cita #<span th:text="${cita.idCita}"></span>
                </p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/citas}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
                <form th:if="${cita.estado.name() == 'PROGRAMADA' or cita.estado.name() == 'CONFIRMADA'}"
                      th:action="@{/citas/{id}/cancelar(id=${cita.idCita})}" method="post" class="d-inline"
                      onsubmit="return confirm('¿Cancelar esta cita?')">
                    <button class="btn btn-danger">
                        <i class="bi bi-x-circle me-1"></i>Cancelar Cita
                    </button>
                </form>
            </div>
        </div>

        <div class="row g-4">
            <!-- Info principal -->
            <div class="col-md-8">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header border-0 p-4">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-info-circle me-2" style="color:#06b6d4;"></i>Información de la Cita
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <small class="text-muted d-block">Fecha</small>
                                <strong th:text="${#temporals.format(cita.fechaCita, 'dd/MM/yyyy')}"></strong>
                            </div>
                            <div class="col-sm-6">
                                <small class="text-muted d-block">Horario</small>
                                <strong th:text="${cita.horaInicio} + ' - ' + ${cita.horaFin}"></strong>
                            </div>
                            <div class="col-sm-6">
                                <small class="text-muted d-block">Estado</small>
                                <span class="badge"
                                      th:classappend="${cita.estado.name() == 'PROGRAMADA'} ? 'bg-warning text-dark' :
                                                      (${cita.estado.name() == 'CONFIRMADA'} ? 'bg-info' :
                                                      (${cita.estado.name() == 'ATENDIDA'} ? 'bg-success' :
                                                      (${cita.estado.name() == 'CANCELADA'} ? 'bg-danger' : 'bg-secondary')))"
                                      th:text="${cita.estado}"></span>
                            </div>
                            <div class="col-sm-6">
                                <small class="text-muted d-block">Canal de Reserva</small>
                                <strong th:text="${cita.canalReserva}"></strong>
                            </div>
                            <div class="col-12" th:if="${cita.motivoConsulta}">
                                <small class="text-muted d-block">Motivo de Consulta</small>
                                <strong th:text="${cita.motivoConsulta}"></strong>
                            </div>
                            <div class="col-12" th:if="${cita.observaciones}">
                                <small class="text-muted d-block">Observaciones</small>
                                <span th:text="${cita.observaciones}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Paciente -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header border-0 p-4">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-person me-2" style="color:#06b6d4;"></i>Paciente
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <small class="text-muted d-block">Nombre</small>
                                <strong th:text="${cita.paciente.nombres + ' ' + cita.paciente.apellidoPaterno + ' ' + cita.paciente.apellidoMaterno}"></strong>
                            </div>
                            <div class="col-sm-6">
                                <small class="text-muted d-block">DNI</small>
                                <strong th:text="${cita.paciente.dni}"></strong>
                            </div>
                            <div class="col-sm-6" th:if="${cita.paciente.telefono}">
                                <small class="text-muted d-block">Teléfono</small>
                                <strong th:text="${cita.paciente.telefono}"></strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Médico y Especialidad -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header border-0 p-4">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-person-badge me-2" style="color:#06b6d4;"></i>Médico
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <small class="text-muted d-block">Nombre</small>
                            <strong th:text="${'Dr. ' + cita.medico.nombres + ' ' + cita.medico.apellidoPaterno}"></strong>
                        </div>
                        <div class="mb-3">
                            <small class="text-muted d-block">CMP</small>
                            <strong th:text="${cita.medico.cmp}"></strong>
                        </div>
                        <div>
                            <small class="text-muted d-block">Consultorio</small>
                            <strong th:text="${cita.medico.consultorio}"></strong>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-header border-0 p-4">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-heart-pulse me-2" style="color:#06b6d4;"></i>Especialidad
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <small class="text-muted d-block">Especialidad</small>
                            <strong th:text="${cita.especialidad.nombre}"></strong>
                        </div>
                        <div class="mb-3">
                            <small class="text-muted d-block">Duración</small>
                            <strong th:text="${cita.especialidad.duracionMinutos} + ' minutos'"></strong>
                        </div>
                        <div>
                            <small class="text-muted d-block">Precio</small>
                            <span class="badge" style="background:#06b6d4;color:#000;font-size:0.9rem;">
                                S/. <span th:text="${cita.especialidad.precioConsulta}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
