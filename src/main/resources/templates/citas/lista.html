<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-calendar-event"></i>Citas médicas</h1>
                <p>Gestión integral de citas del sistema</p>
            </div>
            <a th:href="@{/citas/agendar}" class="btn-nuevo">
                <i class="bi bi-plus-circle-fill"></i>Nueva Cita
            </a>
        </div>

        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${ok}"></span>
        </div>

        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th th:if="${soloLectura != true}">ID</th>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Especialidad</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${citas}">
                        <td th:if="${soloLectura != true}">
                            <span class="badge-estado badge-activo" th:text="${c.idCita}"></span>
                        </td>
                        <td>
                            <strong th:text="${c.nombrePaciente}"></strong>
                            <small th:text="${c.dniPaciente}"></small>
                        </td>
                        <td th:text="${c.nombreMedico}"></td>
                        <td th:text="${c.nombreEspecialidad}"></td>
                        <td th:text="${#temporals.format(c.fechaCita, 'dd/MM/yyyy')}"></td>
                        <td th:text="${c.horaInicio}"></td>
                        <td>
                            <span th:if="${c.estado == 'PROGRAMADA'}" class="badge-estado badge-info">Programada</span>
                            <span th:if="${c.estado == 'CONFIRMADA'}" class="badge-estado badge-primary">Confirmada</span>
                            <span th:if="${c.estado == 'EN_ATENCION'}" class="badge-estado badge-info">En Atención</span>
                            <span th:if="${c.estado == 'ATENDIDA'}" class="badge-estado badge-success">Atendida</span>
                            <span th:if="${c.estado == 'CANCELADA'}" class="badge-estado badge-danger">Cancelada</span>
                            <span th:if="${c.estado == 'NO_ASISTIO'}" class="badge-estado badge-warning">No Asistió</span>
                        </td>
                        <td><div class="acciones-tabla">
                            <a th:href="@{/citas/{id}(id=${c.idCita})}" class="btn-ver" title="Ver detalle">
                                <i class="bi bi-eye"></i>
                            </a>
                        </div></td></tr>
                    <tr th:if="${#lists.isEmpty(citas)}">
                        <td th:attr="colspan=${soloLectura == true} ? 7 : 8" class="table-empty">
                            <i class="bi bi-inbox"></i>
                            <p>No hay citas registradas</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
