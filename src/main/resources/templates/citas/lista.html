<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <!-- Page Header -->
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                        <i class="bi bi-calendar-event me-2" style="color:#06b6d4;"></i>Citas Médicas
                    </h1>
                    <p style="color:rgba(255,255,255,0.5);font-size:13px;">Gestión integral de citas del sistema</p>
                </div>
                <a th:href="@{/citas/agendar}" class="btn-nuevo">
                    <i class="bi bi-plus-circle-fill"></i>Nueva Cita
                </a>
            </div>
        </div>

        <!-- Success Alert -->
        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${ok}"></span>
        </div>

        <!-- Citas Table Card -->
        <div class="card-professional">
            <div class="card-header-professional">
                <h5><i class="bi bi-list-check"></i>Listado de Citas</h5>
            </div>
            <div class="p-4">
                <div class="table-responsive">
                    <table class="table-professional">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Paciente</th>
                                <th>Médico</th>
                                <th>Especialidad</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${citas}">
                                <td>
                                    <span class="badge-status badge-primary" th:text="${c.idCita}"></span>
                                </td>
                                <td>
                                    <strong th:text="${c.nombrePaciente}"></strong>
                                    <small th:text="${c.dniPaciente}"></small>
                                </td>
                                <td th:text="${c.nombreMedico}"></td>
                                <td th:text="${c.nombreEspecialidad}"></td>
                                <td th:text="${#temporals.format(c.fechaCita, 'dd/MM/yyyy')}"></td>
                                <td th:text="${c.horaInicio}"></td>
                                <td>
                                    <span th:if="${c.estado == 'PROGRAMADA'}" class="badge-status badge-info">Programada</span>
                                    <span th:if="${c.estado == 'CONFIRMADA'}" class="badge-status badge-primary">Confirmada</span>
                                    <span th:if="${c.estado == 'ATENDIDA'}" class="badge-status badge-success">Atendida</span>
                                    <span th:if="${c.estado == 'COMPLETADA'}" class="badge-status badge-success">Completada</span>
                                    <span th:if="${c.estado == 'CANCELADA'}" class="badge-status badge-danger">Cancelada</span>
                                    <span th:if="${c.estado == 'NO_ASISTIO'}" class="badge-status badge-warning">No Asistió</span>
                                </td>
                                <td><div class="acciones-tabla">
                                    <a th:href="@{/citas/{id}(id=${c.idCita})}" class="btn-ver" title="Ver detalle">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div></td></tr>
                            <tr th:if="${#lists.isEmpty(citas)}">
                                <td colspan="8" style="text-align:center; padding:3rem 1.25rem; color:rgba(255,255,255,0.5);">
                                    <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
                                    <p class="mt-2">No hay citas registradas</p>
                                </div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
