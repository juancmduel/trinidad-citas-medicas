<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-calendar-check"></i> Citas</h2>
        <a th:href="@{/citas/agendar}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Agendar cita
        </a>
    </div>

    <div th:if="${ok}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${ok}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <form method="get" th:action="@{/citas/calendario}" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Fecha</label>
                    <input type="date" name="fecha" th:value="${fecha}" class="form-control">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-primary w-100">
                        <i class="bi bi-search"></i> Filtrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Hora</th>
                            <th>Paciente</th>
                            <th>Medico</th>
                            <th>Especialidad</th>
                            <th>Estado</th>
                            <th>Canal</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${citas}">
                            <td><strong th:text="${c.horaInicio}"></strong></td>
                            <td th:text="${c.nombrePaciente}"></td>
                            <td th:text="${c.nombreMedico}"></td>
                            <td th:text="${c.nombreEspecialidad}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${c.estado == 'PROGRAMADA'} ? 'bg-warning' :
                                                      (${c.estado == 'CONFIRMADA'} ? 'bg-info' :
                                                      (${c.estado == 'ATENDIDA'} ? 'bg-success' :
                                                      (${c.estado == 'CANCELADA'} ? 'bg-danger' : 'bg-secondary')))"
                                      th:text="${c.estado}"></span>
                            </td>
                            <td><small class="text-muted" th:text="${c.canalReserva}"></small></td>
                            <td class="text-end">
                                <form th:action="@{/citas/{id}/cancelar(id=${c.idCita})}" method="post"
                                      class="d-inline" onsubmit="return confirm('Cancelar esta cita?')"
                                      th:if="${c.estado == 'PROGRAMADA' or c.estado == 'CONFIRMADA'}">
                                    <button class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-x-circle"></i> Cancelar
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(citas)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                <i class="bi bi-calendar-x display-6"></i>
                                <p class="mt-2">No hay citas para esta fecha</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/header :: footer}"></footer>
</body>
</html>
