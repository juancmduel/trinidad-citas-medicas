<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Auditoría')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-clock-history"></i>Detalle de Evento</h1>
                <p>Información completa del evento de auditoría</p>
            </div>
            <span class="badge-accion-lg"
                  th:classappend="${log.accion == 'CREATE'} ? 'ba-lg-create' : (${log.accion == 'UPDATE'} ? 'ba-lg-update' : (${log.accion == 'DELETE'} ? 'ba-lg-delete' : 'ba-lg-other'))"
                  th:text="${log.accion}">CREATE</span>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-info-circle-fill"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Detalles del Evento</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Fecha y Hora</span>
                                    <span class="df-value" th:text="${#temporals.format(log.fechaHora, 'dd/MM/yyyy HH:mm:ss')}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Usuario</span>
                                    <span class="df-value df-value-accent" th:text="${log.username ?: '-'}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Acción</span>
                                    <span class="df-value" th:text="${log.accion}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Entidad</span>
                                    <span class="df-value" th:text="${log.entidad ?: '-'}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6" th:if="${log.idEntidad}">
                                <div class="detail-field">
                                    <span class="df-label">ID Entidad</span>
                                    <span class="df-value" th:text="${log.idEntidad}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">IP Origen</span>
                                    <span class="df-value" style="font-family:monospace;" th:text="${log.ipOrigen ?: '-'}">-</span>
                                </div>
                            </div>
                            <div class="col-12" th:if="${log.detalle}">
                                <div class="detail-field">
                                    <span class="df-label">Detalle</span>
                                    <span class="df-value df-detalle" th:text="${log.detalle}" style="white-space:pre-wrap;font-size:0.85rem;"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="detail-actions">
                    <a th:href="@{/auditoria}" class="btn-volver w-100 text-center">
                        <i class="bi bi-arrow-left me-1"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>

        

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
