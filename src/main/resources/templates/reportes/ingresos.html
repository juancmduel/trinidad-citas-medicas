<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-cash-stack"></i>Reporte de Ingresos</h1>
                <p>Análisis de pagos y transacciones por rango de fechas</p>
            </div>
        </div>

        <div class="card-modern mb-4">
            <div class="card-header-modern">
                <h5><i class="bi bi-funnel"></i> Filtros</h5>
            </div>
            <div class="card-body-modern">
                <form method="get" th:action="@{/reportes/ingresos}" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label-modern">Desde</label>
                        <input type="date" name="desde" class="form-control-modern" th:value="${desde}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label-modern">Hasta</label>
                        <input type="date" name="hasta" class="form-control-modern" th:value="${hasta}" required>
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-modern btn-primary">
                            <i class="bi bi-search"></i> Filtrar
                        </button>
                        <a th:href="@{/reportes/ingresos/pdf(desde=${desde}, hasta=${hasta})}"
                           class="btn btn-modern btn-danger">
                            <i class="bi bi-file-pdf"></i> PDF
                        </a>
                        <a th:href="@{/reportes/ingresos/xlsx(desde=${desde}, hasta=${hasta})}"
                           class="btn btn-modern btn-success">
                            <i class="bi bi-file-excel"></i> Excel
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card-modern">
            <div class="card-header-modern">
                <h5><i class="bi bi-table"></i> Ingresos</h5>
                <span class="text-muted">
                    Mostrando <strong th:text="${#lists.size(ingresos)}"></strong> transacciones
                    | Total: <strong style="color:#16a34a;">S/ <span th:text="${#numbers.formatDecimal(totalIngresos, 1, 2)}"></span></strong>
                </span>
            </div>
            <div class="card-body-modern">
                <div class="table-container">
                    <table class="table-modern">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Fecha Pago</th>
                                <th>Comprobante</th>
                                <th>Paciente</th>
                                <th>DNI</th>
                                <th>Monto</th>
                                <th>Método</th>
                                <th>Estado</th>
                                <th>Fecha Cita</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="i, iter : ${ingresos}">
                                <td th:text="${iter.count}"></td>
                                <td th:text="${i.fechaPago != null ? #temporals.format(i.fechaPago, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                                <td th:text="${i.nroComprobante} ?: '-'"></td>
                                <td th:text="${i.paciente}"></td>
                                <td th:text="${i.dniPaciente}"></td>
                                <td style="font-weight:600;">S/ <span th:text="${#numbers.formatDecimal(i.monto, 1, 2)}"></span></td>
                                <td th:text="${i.metodoPago}"></td>
                                <td>
                                    <span class="badge-estado"
                                          th:classappend="${i.estado == 'PAGADO'} ? 'badge-completado' : (${i.estado == 'ANULADO'} ? 'badge-critico' : 'badge-proceso')"
                                          th:text="${i.estado}"></span>
                                </td>
                                <td th:text="${#temporals.format(i.fechaCita, 'dd/MM/yyyy')}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(ingresos)}">
                                <td colspan="9" class="table-empty">No se encontraron pagos en el rango seleccionado</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
