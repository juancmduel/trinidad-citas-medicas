<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-people"></i>Reporte de Pacientes</h1>
                <p>Listado completo de pacientes registrados</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/reportes}" class="btn-volver">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
                <a th:href="@{/reportes/pacientes/pdf}" class="btn-professional btn-danger-prof">
                    <i class="bi bi-file-pdf"></i> PDF
                </a>
                <a th:href="@{/reportes/pacientes/xlsx}" class="btn-professional btn-success-prof">
                    <i class="bi bi-file-excel"></i> Excel
                </a>
            </div>
        </div>

        <!-- Stats -->
        <div class="adm-stats-row" style="margin-bottom:24px;">
            <div class="adm-stat-card adm-stat-total">
                <i class="bi bi-people"></i>
                <div>
                    <span class="adm-stat-value" th:text="${totalPacientes}"></span>
                    <span class="adm-stat-label">Total Pacientes</span>
                </div>
            </div>
        </div>

        <!-- Tabla de Pacientes -->
        <div class="table-container">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);">
                <h5 style="margin:0;display:flex;align-items:center;gap:8px;font-size:14px;">
                    <i class="bi bi-table" style="color:var(--accent);"></i>Pacientes
                </h5>
            </div>
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>DNI</th>
                        <th>Nombre Completo</th>
                        <th>Sexo</th>
                        <th>F. Nacimiento</th>
                        <th>Tel&eacute;fono</th>
                        <th>Email</th>
                        <th>Distrito</th>
                        <th>Seguro</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${pacientes}">
                        <td><span class="badge-estado badge-activo" th:text="${p.dni}"></span></td>
                        <td><strong th:text="${p.nombreCompleto}"></strong></td>
                        <td th:text="${p.sexo}"></td>
                        <td th:text="${#temporals.format(p.fechaNacimiento, 'dd/MM/yyyy')}"></td>
                        <td th:text="${p.telefono} ?: '-'"></td>
                        <td th:text="${p.email} ?: '-'"></td>
                        <td th:text="${p.distrito} ?: '-'"></td>
                        <td th:text="${p.seguroSalud} ?: '-'"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pacientes)}">
                        <td colspan="8" class="table-empty">
                            <i class="bi bi-inbox"></i>
                            <p>No hay pacientes registrados</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
