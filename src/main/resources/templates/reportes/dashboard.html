<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Reportes')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">

        <!-- Page Header -->
        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-bar-chart me-2" style="color:#06b6d4;"></i>Reportes del Sistema
            </h1>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;">Estadísticas y análisis de actividades</p>
        </div>

        <!-- KPI Cards -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:28px;">
            <div class="kpi-card">
                <i class="bi bi-calendar-event kpi-icon"></i>
                <div class="kpi-label">Total Citas</div>
                <div class="kpi-value" th:text="${totalCitas}">0</div>
            </div>
            <div class="kpi-card">
                <i class="bi bi-people kpi-icon" style="color:#10b981;"></i>
                <div class="kpi-label">Pacientes</div>
                <div class="kpi-value" style="color:#10b981;" th:text="${totalPacientes}">0</div>
            </div>
            <div class="kpi-card">
                <i class="bi bi-person-badge kpi-icon" style="color:#f59e0b;"></i>
                <div class="kpi-label">Médicos</div>
                <div class="kpi-value" style="color:#f59e0b;" th:text="${totalMedicos}">0</div>
            </div>
            <div class="kpi-card">
                <i class="bi bi-calendar-day kpi-icon" style="color:#ef4444;"></i>
                <div class="kpi-label">Citas Hoy</div>
                <div class="kpi-value" style="color:#ef4444;" th:text="${citasHoy}">0</div>
            </div>
        </div>

        <!-- Report Options -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;">
            <a href="/reportes/citas" class="data-card text-decoration-none" style="cursor:pointer;">
                <div class="data-card-header">
                    <i class="bi bi-file-earmark-text"></i> Reporte de Citas
                </div>
                <div class="data-card-body">
                    <p style="margin:0;color:rgba(255,255,255,0.7);">Generar reporte detallado de citas médicas</p>
                </div>
            </a>

            <a href="/reportes/pacientes" class="data-card text-decoration-none" style="cursor:pointer;">
                <div class="data-card-header">
                    <i class="bi bi-file-earmark-text"></i> Reporte de Pacientes
                </div>
                <div class="data-card-body">
                    <p style="margin:0;color:rgba(255,255,255,0.7);">Listado de pacientes registrados</p>
                </div>
            </a>

            <a href="#" class="data-card text-decoration-none" style="cursor:pointer;opacity:0.6;">
                <div class="data-card-header">
                    <i class="bi bi-file-earmark-text"></i> Reporte de Ingresos
                </div>
                <div class="data-card-body">
                    <p style="margin:0;color:rgba(255,255,255,0.7);">Análisis de pagos y ingresos (próximamente)</p>
                </div>
            </a>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
