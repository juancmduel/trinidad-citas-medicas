<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Usuario')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-person-gear me-2" style="color:#06b6d4;"></i>Detalle del Usuario
            </h1>
        </div>

        <div th:if="${usuario != null}" class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between align-items-center">
                <h5><i class="bi bi-person-check"></i> Información del Usuario</h5>
                <div class="d-flex gap-2">
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.idUsuario})}" class="btn-professional btn-outline-prof btn-sm">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <form th:action="@{/usuarios/eliminar/{id}(id=${usuario.idUsuario})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-professional btn-danger-prof btn-sm"
                                onclick="return confirm('¿Eliminar este usuario?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                    </form>
                </div>
            </div>
            <div class="p-4">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Username</label>
                        <p style="font-weight:700;color:#06b6d4;" th:text="${usuario.username}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Email</label>
                        <p th:text="${usuario.email}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Estado</label>
                        <p>
                            <span th:if="${usuario.activo == 1}" class="badge-status badge-success">Activo</span>
                            <span th:unless="${usuario.activo == 1}" class="badge-status badge-danger">Inactivo</span>
                        </p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Creación</label>
                        <p th:text="${#temporals.format(usuario.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Último Login</label>
                        <p th:text="${usuario.fechaUltLogin != null ? #temporals.format(usuario.fechaUltLogin, 'dd/MM/yyyy HH:mm') : 'Nunca'}"></p>
                    </div>
                    <div class="col-md-4">
                        <label style="color:rgba(255,255,255,0.5);font-size:12px;">Roles</label>
                        <p>
                            <span th:each="rol : ${usuario.roles}" class="badge-status badge-primary me-1" th:text="${rol.nombre}"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <a href="/trinidad/usuarios" class="btn-professional btn-outline-prof">
            <i class="bi bi-arrow-left"></i> Volver
        </a>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
