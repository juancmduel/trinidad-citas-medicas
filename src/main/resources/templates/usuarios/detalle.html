<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Usuario')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h1 style="font-size:26px;font-weight:700;margin-bottom:4px;">
                    <i class="bi bi-person-gear me-2" style="color:var(--accent);"></i>Detalle del Usuario
                </h1>
                <p style="color:var(--text-muted);font-size:13px;margin:0;">Información completa de la cuenta de usuario</p>
            </div>
            <span class="badge-estado-lg" th:classappend="${usuario.activo == 1} ? 'be-activo' : 'be-inactivo'"
                  th:text="${usuario.activo == 1} ? 'Activo' : 'Inactivo'"></span>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="detail-card">
                    <div class="detail-card-head">
                        <div class="dch-icon"><i class="bi bi-person-fill"></i></div>
                        <div><h5 class="mb-0" style="font-weight:700;">Información del Usuario</h5></div>
                    </div>
                    <div class="detail-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Usuario</span>
                                    <span class="df-value df-value-accent" th:text="${usuario.username}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Email</span>
                                    <span class="df-value" th:text="${usuario.email}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Fecha Creación</span>
                                    <span class="df-value" th:text="${#temporals.format(usuario.fechaCreacion, 'dd/MM/yyyy HH:mm')}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Último Acceso</span>
                                    <span class="df-value" th:text="${usuario.fechaUltLogin != null ? #temporals.format(usuario.fechaUltLogin, 'dd/MM/yyyy HH:mm') : 'Nunca'}">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Intentos Fallidos</span>
                                    <span class="df-value" th:text="${usuario.intentosFallidos ?: 0}">0</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="detail-field">
                                    <span class="df-label">Roles</span>
                                    <span class="df-value">
                                        <span th:each="rol : ${usuario.rolesNombres}" class="badge-rol-detalle" th:text="${rol}"></span>
                                        <span th:if="${#lists.isEmpty(usuario.rolesNombres)}" style="color:var(--text-muted);">Sin roles</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="detail-actions">
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.idUsuario})}" class="btn btn-primary w-100 mb-2" style="padding:12px;border-radius:10px;font-weight:700;">
                        <i class="bi bi-pencil me-2"></i>Editar Usuario
                    </a>
                    <form th:action="@{/usuarios/toggle/{id}(id=${usuario.idUsuario})}" method="post" style="display:block;" onsubmit="return confirm('¿Cambiar estado?')">
                        <button type="submit" class="btn w-100 mb-2" th:classappend="${usuario.activo == 1} ? 'btn btn-outline-warning' : 'btn btn-outline-success'" style="padding:12px;border-radius:10px;font-weight:600;">
                            <i class="bi me-2" th:classappend="${usuario.activo == 1} ? 'bi-pause-fill' : 'bi-play-fill'"></i>
                            <span th:text="${usuario.activo == 1} ? 'Desactivar' : 'Activar'"></span>
                        </button>
                    </form>
                    <form th:action="@{/usuarios/eliminar/{id}(id=${usuario.idUsuario})}" method="post" style="display:block;" onsubmit="return confirm('¿Eliminar este usuario?')">
                        <button type="submit" class="btn btn-outline-danger w-100 mb-2" style="padding:12px;border-radius:10px;font-weight:600;">
                            <i class="bi bi-trash3 me-2"></i>Eliminar
                        </button>
                    </form>
                    <a th:href="@{/usuarios}" class="btn-volver w-100 text-center">
                        <i class="bi bi-arrow-left me-1"></i>Volver al listado
                    </a>
                </div>
            </div>
        </div>

        

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
