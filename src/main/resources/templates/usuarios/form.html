<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Usuario')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-person-gear me-2" style="color:#06b6d4;"></i>
                <span th:text="${usuario.idUsuario != null} ? 'Editar Usuario' : 'Nuevo Usuario'">Usuario</span>
            </h1>
        </div>

        <div class="card-professional">
            <div class="card-header-professional">
                <h5><i class="bi bi-pencil-square"></i> Formulario de Usuario</h5>
            </div>
            <div class="p-4">
                <form th:action="@{/usuarios/guardar}" method="post">
                    <input type="hidden" th:name="idUsuario" th:value="${usuario.idUsuario}">

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Username <span style="color:#ef4444;">*</span></label>
                            <input type="text" name="username" class="form-control"
                                   th:value="${usuario.username}"
                                   placeholder="usuario123" maxlength="50" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email <span style="color:#ef4444;">*</span></label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${usuario.email}"
                                   placeholder="correo@ejemplo.com" maxlength="120" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <select name="activo" class="form-select">
                                <option value="1" th:selected="${usuario.activo == 1}">Activo</option>
                                <option value="0" th:selected="${usuario.activo == 0}">Inactivo</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn-nuevo">
                            <i class="bi bi-save"></i> Guardar
                        </button>
                        <a href="/trinidad/usuarios" class="btn-ver">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
