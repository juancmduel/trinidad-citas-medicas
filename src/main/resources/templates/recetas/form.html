<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-prescription2"></i>Nueva Receta</h1>
                <p>Registro de receta médica con medicamentos</p>
            </div>
            <a th:href="@{/recetas}" class="btn-volver">
                <i class="bi bi-arrow-left"></i>Cancelar
            </a>
        </div>

        <form th:action="@{/recetas/guardar}" method="post" class="form-receta">

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-stethoscope"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Información de la Atención</span>
                </div>

                <div class="form-field">
                    <label for="idAtencion">Seleccionar Atención <span class="required">*</span></label>
                    <select id="idAtencion" name="idAtencion" class="form-select-professional" required>
                        <option value="">-- Seleccionar --</option>
                        <option th:each="atencion : ${atenciones}"
                                th:value="${atencion.idAtencion}"
                                th:text="${atencion.cita?.paciente?.nombres + ' ' + atencion.cita?.paciente?.apellidoPaterno + ' - ' + atencion.cita?.medico?.nombreCompleto}"
                                th:unless="${atencion.cita == null or atencion.cita.paciente == null}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-file-medical"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Datos de la Receta</span>
                </div>

                <div class="form-field">
                    <label for="nroReceta">Número de Receta <span class="required">*</span></label>
                    <input type="text" id="nroReceta" name="nroReceta" class="form-input-professional" placeholder="REC-2026-001" required>
                </div>

                <div class="form-field">
                    <label for="observaciones">Observaciones / Indicaciones</label>
                    <textarea id="observaciones" name="observaciones" class="form-textarea-professional" rows="4" placeholder="Notas adicionales para el paciente..."></textarea>
                </div>
            </div>

            <div class="form-section-card">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="fs-icon"><i class="bi bi-pills"></i></span>
                    <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Medicamentos</span>
                </div>

                <div id="detalles-container">
                    <div class="medicamento-item">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Nombre Genérico <span class="required">*</span></label>
                                    <input type="text" name="detalles[0].nombreGenerico" class="form-input-professional" placeholder="Ej: Amoxicilina" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Nombre Comercial</label>
                                    <input type="text" name="detalles[0].nombreComercial" class="form-input-professional" placeholder="Ej: Amoxan">
                                </div>
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Presentación <span class="required">*</span></label>
                                    <input type="text" name="detalles[0].presentacion" class="form-input-professional" placeholder="Ej: Cápsulas 500mg" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Dosis <span class="required">*</span></label>
                                    <input type="text" name="detalles[0].dosis" class="form-input-professional" placeholder="Ej: 500mg" required>
                                </div>
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Frecuencia <span class="required">*</span></label>
                                    <input type="text" name="detalles[0].frecuencia" class="form-input-professional" placeholder="Ej: Cada 8 horas" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Duración (días) <span class="required">*</span></label>
                                    <input type="number" name="detalles[0].duracionDias" class="form-input-professional" placeholder="7" min="1" required>
                                </div>
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Vía de Administración <span class="required">*</span></label>
                                    <input type="text" name="detalles[0].viaAdministracion" class="form-input-professional" placeholder="Ej: Oral" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-field">
                                    <label>Indicaciones Especiales</label>
                                    <input type="text" name="detalles[0].indicaciones" class="form-input-professional" placeholder="Ej: Tomar con alimentos">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-nuevo mt-3" onclick="agregarMedicamento()">
                    <i class="bi bi-plus-lg"></i> Agregar Medicamento
                </button>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-guardar">
                    <i class="bi bi-save"></i> Guardar Receta
                </button>
                <a th:href="@{/recetas}" class="btn-volver">
                    <i class="bi bi-x-lg"></i> Cancelar
                </a>
            </div>
        </form>
    </main>
</div>

<script>
    let medicamentoCount = 1;

    function agregarMedicamento() {
        const container = document.getElementById('detalles-container');
        const newItem = document.createElement('div');
        newItem.className = 'medicamento-item';
        newItem.innerHTML = `
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Nombre Genérico <span class="required">*</span></label>
                        <input type="text" name="detalles[${medicamentoCount}].nombreGenerico" class="form-input-professional" placeholder="Ej: Amoxicilina" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Nombre Comercial</label>
                        <input type="text" name="detalles[${medicamentoCount}].nombreComercial" class="form-input-professional" placeholder="Ej: Amoxan">
                    </div>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Presentación <span class="required">*</span></label>
                        <input type="text" name="detalles[${medicamentoCount}].presentacion" class="form-input-professional" placeholder="Ej: Cápsulas 500mg" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Dosis <span class="required">*</span></label>
                        <input type="text" name="detalles[${medicamentoCount}].dosis" class="form-input-professional" placeholder="Ej: 500mg" required>
                    </div>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Frecuencia <span class="required">*</span></label>
                        <input type="text" name="detalles[${medicamentoCount}].frecuencia" class="form-input-professional" placeholder="Ej: Cada 8 horas" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Duración (días) <span class="required">*</span></label>
                        <input type="number" name="detalles[${medicamentoCount}].duracionDias" class="form-input-professional" placeholder="7" min="1" required>
                    </div>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Vía de Administración <span class="required">*</span></label>
                        <input type="text" name="detalles[${medicamentoCount}].viaAdministracion" class="form-input-professional" placeholder="Ej: Oral" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-field">
                        <label>Indicaciones Especiales</label>
                        <input type="text" name="detalles[${medicamentoCount}].indicaciones" class="form-input-professional" placeholder="Ej: Tomar con alimentos">
                    </div>
                </div>
            </div>
            <button type="button" class="btn-eliminar mt-2" onclick="this.parentElement.remove()">
                <i class="bi bi-trash"></i> Eliminar
            </button>
        `;
        container.appendChild(newItem);
        medicamentoCount++;
    }
</script>

</body>
</html>
