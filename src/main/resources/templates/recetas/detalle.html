<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-prescription2 me-2" style="color:#06b6d4;"></i>Detalle de Receta
            </h1>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;">Información completa de la receta médica</p>
        </div>

        <div th:if="${receta != null}" th:object="${receta}">

            <!-- Datos generales de la receta -->
            <div class="card-professional mb-4">
                <div class="card-header-professional">
                    <h5><i class="bi bi-file-medical"></i> Datos de la Receta</h5>
                </div>
                <div class="p-4">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Nº Receta</label>
                            <p style="font-weight:700;color:#06b6d4;" th:text="*{nroReceta}"></p>
                        </div>
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Fecha Emisión</label>
                            <p th:text="${#temporals.format(receta.fechaEmision, 'dd/MM/yyyy HH:mm')}"></p>
                        </div>
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Paciente</label>
                            <p th:text="${receta.atencion.cita.paciente.apellidoPaterno + ' ' + receta.atencion.cita.paciente.nombres}"></p>
                        </div>
                        <div class="col-md-3">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Médico</label>
                            <p th:text="${receta.atencion.medico.apellidoPaterno + ' ' + receta.atencion.medico.nombres}"></p>
                        </div>
                        <div class="col-12" th:if="${receta.observaciones}">
                            <label style="color:rgba(255,255,255,0.5);font-size:12px;">Observaciones</label>
                            <p th:text="${receta.observaciones}"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Listado de medicamentos -->
            <div class="card-professional">
                <div class="card-header-professional d-flex justify-content-between align-items-center">
                    <h5><i class="bi bi-capsule"></i> Medicamentos Recetados</h5>
                    <a th:href="@{/trinidad/recetas/{recetaId}/detalles/nuevo(recetaId=${receta.idReceta})}" class="btn-professional btn-primary-prof btn-sm">
                        <i class="bi bi-plus-lg"></i> Agregar Medicamento
                    </a>
                </div>
                <div class="p-4">
                    <div class="table-responsive">
                        <table class="table-professional">
                            <thead>
                                <tr>
                                    <th>Nombre Genérico</th>
                                    <th>Nombre Comercial</th>
                                    <th>Presentación</th>
                                    <th>Dosis</th>
                                    <th>Frecuencia</th>
                                    <th>Duración</th>
                                    <th>Vía</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="detalle : ${receta.detalles}">
                                    <td><strong th:text="${detalle.nombreGenerico}"></strong></td>
                                    <td th:text="${detalle.nombreComercial ?: '-'}"></td>
                                    <td th:text="${detalle.presentacion ?: '-'}"></td>
                                    <td th:text="${detalle.dosis}"></td>
                                    <td th:text="${detalle.frecuencia}"></td>
                                    <td th:text="${detalle.duracionDias + ' día(s)'}"></td>
                                    <td th:text="${detalle.viaAdministracion ?: '-'}"></td>
                                    <td class="text-end">
                                        <a th:href="@{/trinidad/recetas/{recetaId}/detalles/editar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}" class="btn-professional btn-outline-prof btn-sm me-1">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/trinidad/recetas/{recetaId}/detalles/eliminar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}"
                                           class="btn-professional btn-danger-prof btn-sm"
                                           onclick="return confirm('¿Eliminar este medicamento?')">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${#lists.isEmpty(receta.detalles)}" style="text-align:center;padding:3rem 1.25rem;color:rgba(255,255,255,0.5);">
                        <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
                        <p class="mt-2">No hay medicamentos registrados en esta receta</p>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-3">
            <a href="/trinidad/recetas" class="btn-professional btn-outline-prof">
                <i class="bi bi-arrow-left"></i> Volver al listado
            </a>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
