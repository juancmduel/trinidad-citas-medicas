<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <!-- Page Header -->
        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-prescription2 me-2" style="color:#06b6d4;"></i>Recetas Médicas
            </h1>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;">Recetas emitidas para pacientes</p>
        </div>

        <!-- Alerts -->
        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle"></i><span th:text="${ok}"></span>
        </div>

        <!-- Data Table -->
        <div class="card-professional">
            <div class="card-header-professional">
                <h5><i class="bi bi-list"></i>Listado de Recetas</h5>
            </div>
            <div class="p-4">
                <div class="table-responsive">
                    <table class="table-professional">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nº Receta</th>
                                <th>Paciente</th>
                                <th>Médico</th>
                                <th>Fecha Emisión</th>
                                <th>Medicamentos</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="receta : ${recetas}">
                                <td th:text="${receta.idReceta}"></td>
                                <td><strong th:text="${receta.nroReceta}"></strong></td>
                                <td th:text="${receta.atencion.cita.paciente.apellidoPaterno + ' ' + receta.atencion.cita.paciente.nombres}"></td>
                                <td th:text="${receta.atencion.medico.apellidoPaterno + ' ' + receta.atencion.medico.nombres}"></td>
                                <td th:text="${#temporals.format(receta.fechaEmision, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <span class="badge-status badge-info" th:text="${receta.detalles.size()} + ' medicamento(s)'"></span>
                                </td>
                                <td><div class="acciones-tabla">
                                    <a th:href="@{/recetas/{id}(id=${receta.idReceta})}" class="btn-ver">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </div></td></tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(recetas)}" style="text-align:center; padding:3rem 1.25rem; color:rgba(255,255,255,0.5);">
                    <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
                    <p class="mt-2">No hay recetas registradas</p>
                </div>
            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
