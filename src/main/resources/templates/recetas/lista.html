<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${titulo})}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-prescription2"></i>Recetas médicas</h1>
                <p>Recetas emitidas para pacientes</p>
            </div>
            <a th:href="@{/recetas/nueva}" class="btn-nuevo">
                <i class="bi bi-plus-circle-fill"></i>Nueva Receta
            </a>
        </div>

        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle"></i><span th:text="${ok}"></span>
        </div>

        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>N° Receta</th>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Fecha Emisión</th>
                        <th>Medicamentos</th>
                        <th style="text-align:center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="receta : ${recetas}">
                        <td th:text="${receta.idReceta}"></td>
                        <td><strong th:text="${receta.nroReceta}"></strong></td>
                        <td th:text="${receta.atencion.cita.paciente.apellidoPaterno + ' ' + receta.atencion.cita.paciente.nombres}"></td>
                        <td th:text="${receta.atencion.medico.apellidoPaterno + ' ' + receta.atencion.medico.nombres}"></td>
                        <td th:text="${#temporals.format(receta.fechaEmision, 'dd/MM/yyyy')}"></td>
                        <td>
                            <span class="badge-estado badge-info" th:text="${receta.detalles.size()} + ' medicamento(s)'"></span>
                        </td>
                        <td><div class="action-group">
                            <a th:href="@{/recetas/{id}(id=${receta.idReceta})}" class="action-btn action-view">
                                <i class="bi bi-eye"></i>
                            </a>
                        </div></td></tr>
                    <tr th:if="${#lists.isEmpty(recetas)}">
                        <td colspan="7" class="table-empty">
                            <i class="bi bi-inbox"></i>
                            <p>No hay recetas registradas</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
