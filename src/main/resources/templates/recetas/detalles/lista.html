<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Medicamentos de Receta')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-capsule"></i>Medicamentos de Receta</h1>
                <p>N° Receta: <span th:text="${receta.nroReceta}"></span></p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/recetas/{recetaId}/detalles/nuevo(recetaId=${receta.idReceta})}" class="btn-nuevo">
                    <i class="bi bi-plus-lg"></i> Nuevo Medicamento
                </a>
                <a th:href="@{/recetas/{id}(id=${receta.idReceta})}" class="btn-ver">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </div>

        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>Nombre Genérico</th>
                        <th>Nombre Comercial</th>
                        <th>Dosis</th>
                        <th>Frecuencia</th>
                        <th>Duración</th>
                        <th>Vía</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="detalle : ${detalles}">
                        <td><strong th:text="${detalle.nombreGenerico}"></strong></td>
                        <td th:text="${detalle.nombreComercial ?: '-'}"></td>
                        <td th:text="${detalle.dosis}"></td>
                        <td th:text="${detalle.frecuencia}"></td>
                        <td th:text="${detalle.duracionDias + ' día(s)'}"></td>
                        <td th:text="${detalle.viaAdministracion ?: '-'}"></td>
                        <td><div class="acciones-tabla" style="justify-content:flex-end;">
                            <a th:href="@{/recetas/{recetaId}/detalles/editar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}" class="btn-editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/recetas/{recetaId}/detalles/eliminar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}"
                               class="btn-eliminar"
                               onclick="return confirm('¿Eliminar este medicamento?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div></td></tr>
                    <tr th:if="${#lists.isEmpty(detalles)}">
                        <td colspan="7" class="table-empty">
                            <i class="bi bi-inbox"></i>
                            <p>No hay medicamentos en esta receta</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
