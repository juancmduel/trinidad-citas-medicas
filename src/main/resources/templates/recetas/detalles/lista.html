<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Medicamentos de Receta')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-capsule me-2" style="color:#06b6d4;"></i>Medicamentos de Receta
            </h1>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;">Nº Receta: <span th:text="${receta.nroReceta}"></span></p>
        </div>

        <div class="card-professional mb-4">
            <div class="card-header-professional d-flex justify-content-between align-items-center">
                <h5><i class="bi bi-list"></i> Listado de Medicamentos</h5>
                <a th:href="@{/trinidad/recetas/{recetaId}/detalles/nuevo(recetaId=${receta.idReceta})}" class="btn-professional btn-primary-prof btn-sm">
                    <i class="bi bi-plus-lg"></i> Nuevo Medicamento
                </a>
            </div>
            <div class="p-4">
                <div class="table-responsive">
                    <table class="table-professional">
                        <thead>
                            <tr>
                                <th>Nombre Genérico</th>
                                <th>Nombre Comercial</th>
                                <th>Dosis</th>
                                <th>Frecuencia</th>
                                <th>Duración</th>
                                <th>Vía</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detalle : ${detalles}">
                                <td><strong th:text="${detalle.nombreGenerico}"></strong></td>
                                <td th:text="${detalle.nombreComercial ?: '-'}"></td>
                                <td th:text="${detalle.dosis}"></td>
                                <td th:text="${detalle.frecuencia}"></td>
                                <td th:text="${detalle.duracionDias + ' día(s)'}"></td>
                                <td th:text="${detalle.viaAdministracion ?: '-'}"></td>
                                <td><div class="acciones-tabla">
                                    <a th:href="@{/trinidad/recetas/{recetaId}/detalles/editar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}" class="btn-professional btn-outline-prof btn-sm me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/trinidad/recetas/{recetaId}/detalles/eliminar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}"
                                       class="btn-eliminar"
                                       onclick="return confirm('¿Eliminar este medicamento?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div></td></tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(detalles)}" style="text-align:center;padding:3rem 1.25rem;color:rgba(255,255,255,0.5);">
                    <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
                    <p class="mt-2">No hay medicamentos en esta receta</p>
                </div>
            </div>
        </div>

        <a th:href="@{/trinidad/recetas/{id}(id=${receta.idReceta})}" class="btn-ver">
            <i class="bi bi-arrow-left"></i> Volver a Receta
        </a>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
