<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Medicamento de Receta')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-capsule"></i>
                    <span th:text="${detalle.idDetalle != null} ? 'Editar Medicamento' : 'Nuevo Medicamento'">Medicamento</span>
                </h1>
                <p>Receta N°: <span th:text="${receta.nroReceta}"></span></p>
            </div>
            <a th:href="@{/recetas/{id}(id=${receta.idReceta})}" class="btn-volver">
                <i class="bi bi-arrow-left"></i>Volver
            </a>
        </div>

        <div class="form-section-card">
            <div class="d-flex align-items-center gap-3 mb-4">
                <span class="fs-icon"><i class="bi bi-capsule"></i></span>
                <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Formulario de Medicamento</span>
            </div>

            <form th:action="@{/recetas/{recetaId}/detalles/guardar(recetaId=${receta.idReceta})}" method="post">
                <input type="hidden" th:name="idDetalle" th:value="${detalle.idDetalle}">

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="nombreGenerico"><span class="required">*</span>Nombre Genérico</label>
                            <input type="text" id="nombreGenerico" name="nombreGenerico" class="form-input-professional"
                                   th:value="${detalle.nombreGenerico}" maxlength="150" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="nombreComercial">Nombre Comercial</label>
                            <input type="text" id="nombreComercial" name="nombreComercial" class="form-input-professional"
                                   th:value="${detalle.nombreComercial}" maxlength="150">
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <div class="form-field">
                            <label for="presentacion"><span class="required">*</span>Presentación</label>
                            <input type="text" id="presentacion" name="presentacion" class="form-input-professional"
                                   th:value="${detalle.presentacion}" placeholder="Tableta 500mg" maxlength="100" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-field">
                            <label for="dosis"><span class="required">*</span>Dosis</label>
                            <input type="text" id="dosis" name="dosis" class="form-input-professional"
                                   th:value="${detalle.dosis}" placeholder="1 tableta" maxlength="50" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-field">
                            <label for="frecuencia"><span class="required">*</span>Frecuencia</label>
                            <input type="text" id="frecuencia" name="frecuencia" class="form-input-professional"
                                   th:value="${detalle.frecuencia}" placeholder="Cada 8 horas" maxlength="50" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-field">
                            <label for="duracionDias"><span class="required">*</span>Duración (días)</label>
                            <input type="number" id="duracionDias" name="duracionDias" class="form-input-professional"
                                   th:value="${detalle.duracionDias}" min="1" max="365" required>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="viaAdministracion"><span class="required">*</span>Vía de Administración</label>
                            <select id="viaAdministracion" name="viaAdministracion" class="form-select-professional" required>
                                <option value="">-- Seleccionar --</option>
                                <option value="Oral" th:selected="${detalle.viaAdministracion == 'Oral'}">Oral</option>
                                <option value="IV" th:selected="${detalle.viaAdministracion == 'IV'}">IV (Intravenosa)</option>
                                <option value="IM" th:selected="${detalle.viaAdministracion == 'IM'}">IM (Intramuscular)</option>
                                <option value="Subcutánea" th:selected="${detalle.viaAdministracion == 'Subcutánea'}">Subcutánea</option>
                                <option value="Tópica" th:selected="${detalle.viaAdministracion == 'Tópica'}">Tópica</option>
                                <option value="Inhalada" th:selected="${detalle.viaAdministracion == 'Inhalada'}">Inhalada</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-field">
                            <label for="indicaciones">Indicaciones</label>
                            <textarea id="indicaciones" name="indicaciones" class="form-textarea-professional" rows="2"
                                      th:text="${detalle.indicaciones}" maxlength="500"></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-nuevo">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                    <a th:href="@{/recetas/{id}(id=${receta.idReceta})}" class="btn-volver">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
