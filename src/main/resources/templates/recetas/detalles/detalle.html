<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle Medicamento')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-capsule"></i>Detalle de Medicamento</h1>
                <p>Información del medicamento recetado</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/recetas/{recetaId}/detalles/editar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}" class="action-btn action-edit" title="Editar">
                    <i class="bi bi-pencil"></i>
                </a>
                <a th:href="@{/recetas/{recetaId}/detalles/eliminar/{id}(recetaId=${receta.idReceta}, id=${detalle.idDetalle})}"
                   class="action-btn action-delete" title="Eliminar"
                   onclick="return confirm('¿Eliminar este medicamento?')">
                    <i class="bi bi-trash"></i>
                </a>
                <a th:href="@{/recetas/{id}(id=${receta.idReceta})}" class="btn-ver">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </div>

        <div th:if="${detalle != null}" class="detail-card mb-4">
            <div class="detail-card-head">
                <span class="dch-icon"><i class="bi bi-file-medical"></i></span>
                <span style="font-weight:700;font-size:1rem;color:var(--text-primary);">Datos del Medicamento</span>
            </div>
            <div class="detail-card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="detail-field">
                            <span class="df-label">Nombre Genérico</span>
                            <span class="df-value df-value-accent" th:text="${detalle.nombreGenerico}"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="detail-field">
                            <span class="df-label">Nombre Comercial</span>
                            <span class="df-value" th:text="${detalle.nombreComercial ?: '-'}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Presentación</span>
                            <span class="df-value" th:text="${detalle.presentacion}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Dosis</span>
                            <span class="df-value" th:text="${detalle.dosis}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Frecuencia</span>
                            <span class="df-value" th:text="${detalle.frecuencia}"></span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="detail-field">
                            <span class="df-label">Duración</span>
                            <span class="df-value" th:text="${detalle.duracionDias + ' día(s)'}"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="detail-field">
                            <span class="df-label">Vía de Administración</span>
                            <span class="df-value" th:text="${detalle.viaAdministracion ?: '-'}"></span>
                        </div>
                    </div>
                    <div class="col-md-6" th:if="${detalle.indicaciones}">
                        <div class="detail-field">
                            <span class="df-label">Indicaciones</span>
                            <span class="df-value" th:text="${detalle.indicaciones}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
