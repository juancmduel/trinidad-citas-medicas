<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Especialidades')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">
        <!-- Page Header -->
        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-heart-pulse me-2" style="color:#06b6d4;"></i>Especialidades
            </h1>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;">Catálogo de especialidades médicas disponibles</p>
        </div>

        <!-- Specialties Grid -->
        <div class="grid-professional grid-cols-3">
            <div th:each="e : ${especialidades}" class="card-professional h-100">
                <div class="p-4">
                    <div class="d-flex align-items-start justify-content-between mb-3">
                        <div>
                            <h5 style="font-size:1.1rem;font-weight:700;margin:0;" th:text="${e.nombre}">Especialidad</h5>
                            <small style="color:rgba(255,255,255,0.5); font-size:0.8rem;" th:text="${e.duracionMinutos} + ' min por cita'"></small>
                        </div>
                        <i class="bi bi-heart-pulse" style="color:#06b6d4; font-size:1.8rem;"></i>
                    </div>
                    <p style="color:rgba(255,255,255,0.6);font-size:0.9rem;margin:1rem 0;" th:text="${e.descripcion ?: 'Descripción no disponible'}"></p>
                    <div style="border-top:1px solid var(--color-border); padding-top:1rem; margin-top:1rem; display:flex; align-items:center; justify-content:space-between;">
                        <span class="badge-status badge-primary">
                            S/. <span th:text="${#numbers.formatDecimal(e.precioConsulta, 1, 2, 'DEFAULT')}">0.00</span>
                        </span>
                        <span th:if="${e.activo == 1}" class="badge-status badge-success">Activo</span>
                        <span th:unless="${e.activo == 1}" class="badge-status badge-danger">Inactivo</span>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <a th:href="@{/especialidades/editar/{id}(id=${e.idEspecialidad})}"
                           class="btn btn-sm btn-outline-warning w-50">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <form th:action="@{/especialidades/eliminar/{id}(id=${e.idEspecialidad})}"
                              method="post" style="display:inline;width:50%;"
                              onsubmit="return confirm('¿Eliminar esta especialidad?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(especialidades)}" style="grid-column:1/-1;">
                <div class="alert-professional alert-info-prof">
                    <i class="bi bi-info-circle"></i>
                    No hay especialidades registradas
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
