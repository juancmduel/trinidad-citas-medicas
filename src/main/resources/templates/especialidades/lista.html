<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Especialidades')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">

        <div class="page-header">
            <div>
                <h1><i class="bi bi-heart-pulse"></i>Especialidades</h1>
                <p>Catálogo de especialidades médicas disponibles</p>
            </div>
            <a th:href="@{/especialidades/nuevo}" class="btn-nuevo">
                <i class="bi bi-plus-lg"></i>Nueva Especialidad
            </a>
        </div>

        <div th:if="${param.ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${param.ok}"></span>
        </div>
        <div th:if="${param.error}" class="alert-professional alert-danger-prof mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${param.error}"></span>
        </div>

        <!-- Stats con iconos mejorados -->
        <div class="stats-grid mb-4">
            <div class="stat-card">
                <div class="stat-icon stat-icon-total"><i class="bi bi-grid-3x3-gap-fill"></i></div>
                <div>
                    <div class="stat-value" th:text="${#lists.size(especialidades)}">0</div>
                    <div class="stat-label">Total Especialidades</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-activo"><i class="bi bi-check-circle-fill"></i></div>
                <div>
                    <div class="stat-value" th:text="${#lists.size(especialidades.?[activo == 1])}">0</div>
                    <div class="stat-label">Activas</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon stat-icon-inactivo"><i class="bi bi-x-circle-fill"></i></div>
                <div>
                    <div class="stat-value" th:text="${#lists.size(especialidades.?[activo == 0])}">0</div>
                    <div class="stat-label">Inactivas</div>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-bar mb-4">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" class="form-input-professional" placeholder="Buscar especialidad por nombre o descripción..." oninput="filterCards()">
        </div>

        <!-- Grid de Especialidades -->
        <div class="esp-grid">
            <div th:each="e : ${especialidades}" class="esp-card" th:data-search="${e.nombre + ' ' + e.descripcion}">
                <div class="esp-card-inner">
                    <div class="esp-top">
                        <!-- Icono dinámico por especialidad -->
                        <div class="esp-icon" th:style="'background:' + (e.bgColor ?: '#f3f4f6') + '; color:' + (e.color ?: '#6b7280') + ';'">
                            <i th:class="${e.icono} ?: 'bi bi-stethoscope'"></i>
                        </div>
                        <div th:if="${e.activo == 1}" class="badge-estado badge-activo">Activo</div>
                        <div th:unless="${e.activo == 1}" class="badge-estado badge-inactivo">Inactivo</div>
                    </div>
                    <div class="esp-body">
                        <h5 class="esp-name" th:text="${e.nombre}">Cardiología</h5>
                        <div class="esp-meta">
                            <span class="esp-meta-item"><i class="bi bi-clock me-1"></i><span th:text="${e.duracionMinutos} + ' min'">30 min</span></span>
                            <span class="esp-meta-item"><i class="bi bi-currency-dollar me-1"></i>S/ <span th:text="${#numbers.formatDecimal(e.precioConsulta, 1, 2, 'DEFAULT')}">150.00</span></span>
                        </div>
                        <p class="esp-desc" th:text="${e.descripcion ?: 'Sin descripción'}">Descripción de la especialidad</p>
                    </div>
                    <div class="esp-footer">
                        <div class="esp-actions">
                            <a th:href="@{/especialidades/editar/{id}(id=${e.idEspecialidad})}" class="esp-btn esp-btn-edit" title="Editar especialidad">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <form th:action="@{/especialidades/toggle/{id}(id=${e.idEspecialidad})}" method="post" style="display:inline;" onsubmit="return confirm('¿Cambiar estado de esta especialidad?')">
                                <button type="submit" class="esp-btn" th:classappend="${e.activo == 1} ? 'esp-btn-deactivate' : 'esp-btn-activate'" th:title="${e.activo == 1} ? 'Desactivar especialidad' : 'Activar especialidad'">
                                    <i class="bi" th:classappend="${e.activo == 1} ? 'bi-pause-fill' : 'bi-play-fill'"></i>
                                </button>
                            </form>
                            <form th:action="@{/especialidades/eliminar/{id}(id=${e.idEspecialidad})}" method="post" style="display:inline;" onsubmit="return confirm('¿Desactivar esta especialidad? Se eliminará de las opciones disponibles.')">
                                <button type="submit" class="esp-btn esp-btn-delete" title="Eliminar especialidad">
                                    <i class="bi bi-trash3-fill"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(especialidades)}" class="empty-state" style="grid-column:1/-1;">
                <i class="bi bi-inbox"></i>
                <p>No hay especialidades registradas</p>
                <a th:href="@{/especialidades/nuevo}" class="btn-guardar">Crear primera especialidad</a>
            </div>
        </div>

        <script>
        function filterCards() {
            var q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.esp-card').forEach(function(c) {
                var data = (c.getAttribute('data-search') || '').toLowerCase();
                c.classList.toggle('hidden', q.length > 0 && data.indexOf(q) === -1);
            });
        }
        </script>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
