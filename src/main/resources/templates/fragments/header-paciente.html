<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titulo='Trinidad')">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | Trinidad'">Trinidad</title>
    <script>
        (function() {
            var t = localStorage.getItem('trinidad-theme');
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/system.css}">
    <link rel="stylesheet" th:href="@{/css/trinidad.css}">
</head>
<body class="app-body">

<nav th:fragment="navbar" id="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i class="bi bi-hospital-fill" style="color:white;"></i></div>
        <div class="sidebar-brand-text">
            <span class="brand-name">TRINIDAD</span>
            <span class="brand-sub">Portal del Paciente</span>
        </div>
    </div>

    <div class="sidebar-user" sec:authorize="isAuthenticated()">
        <div class="user-avatar"><i class="bi bi-person-fill" style="color:white;"></i></div>
        <div class="user-info">
            <span class="user-name" sec:authentication="name">Paciente</span>
            <span class="user-role">En l&iacute;nea</span>
        </div>
    </div>

    <div class="sidebar-menu" sec:authorize="isAuthenticated()">

        <p class="menu-label">MI PORTAL</p>
        <a class="sidebar-item" th:href="@{/portal/dashboard}">
            <i class="bi bi-speedometer2"></i><span>Dashboard</span>
        </a>
        <a class="sidebar-item" th:href="@{/portal/agendar}">
            <i class="bi bi-calendar-plus"></i><span>Agendar Cita</span>
        </a>
        <a class="sidebar-item" th:href="@{/portal/mis-citas}">
            <i class="bi bi-calendar3"></i><span>Mis Citas</span>
        </a>
        <a class="sidebar-item" th:href="@{/portal/historia}">
            <i class="bi bi-file-earmark-medical"></i><span>Historia Cl&iacute;nica</span>
        </a>
        <a class="sidebar-item" th:href="@{/portal/mi-perfil}">
            <i class="bi bi-person-gear"></i><span>Mi Perfil</span>
        </a>

        <p class="menu-label mt-2">CUENTA</p>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="sidebar-item" style="background:none;border:none;width:100%;color:var(--text-primary);cursor:pointer;">
                <i class="bi bi-box-arrow-left"></i><span>Cerrar Sesi&oacute;n</span>
            </button>
        </form>
    </div>
</nav>

<div th:fragment="topbar" id="topbar">
    <button class="topbar-toggle d-lg-none" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>
    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
            localStorage.setItem('sidebarOpen', sidebar.classList.contains('open'));
        }
        document.addEventListener('DOMContentLoaded', function() {
            if (window.innerWidth <= 991.98) {
                var isOpen = localStorage.getItem('sidebarOpen') === 'true';
                if (isOpen) {
                    document.getElementById('sidebar').classList.add('open');
                    document.getElementById('sidebarOverlay').classList.add('show');
                }
            }
        });
    </script>
    <div class="topbar-title">
        <i class="bi bi-hospital me-2"></i>TRINIDAD MEDICAL
    </div>
    <div class="topbar-right" sec:authorize="isAuthenticated()">
        <button class="btn-theme" onclick="toggleTheme()" title="Cambiar tema">
            <i id="themeIcon" class="bi bi-moon-fill"></i>
        </button>
        <span class="topbar-user">
            <i class="bi bi-circle-fill text-success me-1" style="font-size:0.45rem;"></i>
            Bienvenido, <strong class="ms-1" style="color:var(--accent);" sec:authentication="name">Paciente</strong>
        </span>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn-topbar-logout">
                <i class="bi bi-box-arrow-right"></i> Salir
            </button>
        </form>
    </div>

    <script>
    (function() {
        var theme = localStorage.getItem('trinidad-theme');
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.removeAttribute('data-theme');
        }
        var icon = document.getElementById('themeIcon');
        if (icon) {
            icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        }
    })();

    function toggleTheme() {
        var html = document.documentElement;
        var isDark = html.getAttribute('data-theme') === 'dark';
        var icon = document.getElementById('themeIcon');
        html.classList.add('theme-transitioning');
        if (isDark) {
            html.removeAttribute('data-theme');
            localStorage.setItem('trinidad-theme', 'light');
            if (icon) icon.className = 'bi bi-moon-fill';
        } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('trinidad-theme', 'dark');
            if (icon) icon.className = 'bi bi-sun-fill';
        }
        setTimeout(function() { html.classList.remove('theme-transitioning'); }, 500);
    }
    </script>

    <div id="sidebarOverlay" onclick="this.classList.remove('show');document.getElementById('sidebar').classList.remove('open')"></div>
</div>

<footer th:fragment="footer" class="app-footer">
    <span>&copy; 2026 Trinidad &amp; Especialidades Medicas &mdash; Tarapoto, San Martin</span>
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</footer>
