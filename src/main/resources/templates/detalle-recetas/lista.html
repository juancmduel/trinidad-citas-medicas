<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle de Recetas')}"></head>
<body class="app-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>
    <main class="page-main">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-capsule"></i>Detalle de Recetas</h1>
                <p>Medicamentos registrados en las recetas médicas</p>
            </div>
            <a th:href="@{/detalle-recetas/nuevo}" class="btn-nuevo">
                <i class="bi bi-plus-lg"></i>Nuevo Medicamento
            </a>
        </div>
        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle"></i><span th:text="${ok}"></span>
        </div>
        <div class="table-container">
            <table class="table-modern">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Receta</th>
                        <th>Nombre Genérico</th>
                        <th>Nombre Comercial</th>
                        <th>Presentación</th>
                        <th>Dosis</th>
                        <th>Frecuencia</th>
                        <th>Duración</th>
                        <th>Vía</th>
                        <th style="text-align:center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="detalle : ${detalles}">
                        <td th:text="${detalle.idDetalle}"></td>
                        <td>
                            <a th:href="@{/recetas/{id}(id=${detalle.receta.idReceta})}"
                               th:text="${detalle.receta.nroReceta}"
                               class="df-value-accent" style="text-decoration:none;"></a>
                        </td>
                        <td><strong th:text="${detalle.nombreGenerico}"></strong></td>
                        <td th:text="${detalle.nombreComercial ?: '-'}"></td>
                        <td th:text="${detalle.presentacion ?: '-'}"></td>
                        <td th:text="${detalle.dosis}"></td>
                        <td th:text="${detalle.frecuencia}"></td>
                        <td th:text="${detalle.duracionDias + ' Día(s)'}"></td>
                        <td th:text="${detalle.viaAdministracion ?: '-'}"></td>
                        <td style="text-align:center;">
                            <div class="action-group">
                                <a th:href="@{/detalle-recetas/editar/{id}(id=${detalle.idDetalle})}" class="action-btn action-edit" title="Editar"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/detalle-recetas/eliminar/{id}(id=${detalle.idDetalle})}" class="action-btn action-delete" title="Eliminar" onclick="return confirm('¿Eliminar este medicamento?')"><i class="bi bi-trash"></i></a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(detalles)}">
                        <td colspan="10" class="table-empty">No hay medicamentos registrados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>
</body>
</html>
