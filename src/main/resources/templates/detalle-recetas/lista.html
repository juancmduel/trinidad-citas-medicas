<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Detalle de Recetas')}"></head>
<body class="app-body">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="app-content">
    <div th:replace="~{fragments/header :: topbar}"></div>

    <main class="page-main">

        <div class="mb-4">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;">
                <i class="bi bi-capsule me-2" style="color:#06b6d4;"></i>Detalle de Recetas
            </h1>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;">Medicamentos registrados en las recetas médicas</p>
        </div>

        <!-- Alerts -->
        <div th:if="${ok}" class="alert-professional alert-success-prof mb-4">
            <i class="bi bi-check-circle"></i><span th:text="${ok}"></span>
        </div>

        <!-- Actions -->
        <div class="mb-3 text-end">
            <a href="/trinidad/detalle-recetas/nuevo" class="btn-nuevo">
                <i class="bi bi-plus-lg"></i> Nuevo Medicamento
            </a>
        </div>

        <!-- Data Table -->
        <div class="card-professional">
            <div class="card-header-professional">
                <h5><i class="bi bi-list"></i> Listado de Medicamentos</h5>
            </div>
            <div class="p-4">
                <div class="table-responsive">
                    <table class="table-professional">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Receta</th>
                                <th>Nombre Genérico</th>
                                <th>Nombre Comercial</th>
                                <th>Presentación</th>
                                <th>Dosis</th>
                                <th>Frecuencia</th>
                                <th>Duración</th>
                                <th>Vía</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detalle : ${detalles}">
                                <td th:text="${detalle.idDetalle}"></td>
                                <td>
                                    <a th:href="@{/recetas/{id}(id=${detalle.receta.idReceta})}"
                                       th:text="${detalle.receta.nroReceta}"
                                       style="color:#06b6d4;text-decoration:none;"></a>
                                </td>
                                <td><strong th:text="${detalle.nombreGenerico}"></strong></td>
                                <td th:text="${detalle.nombreComercial ?: '-'}"></td>
                                <td th:text="${detalle.presentacion ?: '-'}"></td>
                                <td th:text="${detalle.dosis}"></td>
                                <td th:text="${detalle.frecuencia}"></td>
                                <td th:text="${detalle.duracionDias + ' día(s)'}"></td>
                                <td th:text="${detalle.viaAdministracion ?: '-'}"></td>
                                <td><div class="acciones-tabla">
                                    <a th:href="@{/detalle-recetas/editar/{id}(id=${detalle.idDetalle})}"
                                       class="btn-professional btn-outline-prof btn-sm me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/detalle-recetas/eliminar/{id}(id=${detalle.idDetalle})}"
                                       class="btn-eliminar"
                                       onclick="return confirm('¿Eliminar este medicamento?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div></td></tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(detalles)}" style="text-align:center;padding:3rem 1.25rem;color:rgba(255,255,255,0.5);">
                    <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
                    <p class="mt-2">No hay medicamentos registrados</p>
                </div>
            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/header :: footer}"></footer>
</div>

</body>
</html>
