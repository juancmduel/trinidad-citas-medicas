# ================================================================
#  Perfil ORACLE - Respaldo con Oracle 21c XE
#
#  Usar si necesitas volver a Oracle. Arrancar con:
#    mvn spring-boot:run -Dspring-boot.run.profiles=oracle,api,web
#
#  ANTES de usar, ejecutar en SQL Developer:
#    1. db/oracle/00_create_user.sql  (como SYS o SYSTEM)
#    2. db/oracle/01_setup.sql        (como TRINIDAD_DB)
# ================================================================

spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=TRINIDAD_DB
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.sql.init.mode=never
