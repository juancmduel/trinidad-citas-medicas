# ============================================================
# PERFIL ORACLE - Oracle Database 21c XE
# Requiere tener Oracle instalado y el esquema TRINIDAD_DB creado
# ============================================================

# Conexion Oracle
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=TRINIDAD_DB
spring.datasource.password=Trinidad2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Pool de conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate para Oracle
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Sin default_schema: las tablas son del usuario conectado, no necesita prefijo
# spring.jpa.properties.hibernate.default_schema=TRINIDAD_DB
spring.jpa.open-in-view=false

# El esquema y datos se cargan manualmente desde db/oracle/01_schema.sql y 02_seed.sql
spring.sql.init.mode=never
