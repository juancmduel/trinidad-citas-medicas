# ================================================================
#  Perfil DEV - H2 en memoria (sin Oracle instalado)
#
#  Usar solo si NO tienes Oracle. Arrancar con:
#    mvn spring-boot:run -Dspring-boot.run.profiles=dev,api,web
#
#  Consola H2 disponible en: http://localhost:8081/trinidad/h2-console
#  JDBC URL: jdbc:h2:mem:trinidaddb
# ================================================================

spring.datasource.url=jdbc:h2:mem:trinidaddb;MODE=Oracle;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=FALSE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.schema-locations=classpath:db/h2/01_schema_h2.sql
spring.sql.init.data-locations=classpath:db/h2/02_seed_h2.sql
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true
