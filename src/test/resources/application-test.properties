# ─────────────────────────────────────────────────────────
#  PERFIL DE PRUEBAS — H2 en memoria + datos precargados
# ─────────────────────────────────────────────────────────
spring.application.name=trinidad-citas-test

# H2 en memoria (modo Oracle para compatibilidad)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=FALSE;NON_KEYWORDS=USER,PASSWORD
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# JPA — Hibernate crea el esquema desde las entidades
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# No se cargan automáticamente los SQL de producción en tests.
# Cada test que necesita datos usa @Sql(scripts = "...") explícitamente.
spring.sql.init.mode=never

# JWT para tests (clave fija)
trinidad.jwt.secret=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcA==
trinidad.jwt.expiration-ms=3600000
trinidad.jwt.refresh-ms=86400000

# Logging silencioso en tests
logging.level.root=WARN
logging.level.com.trinidad=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
