<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" width="800" height="1050">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800');
      text { font-family: 'Inter', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="1050" fill="#FFFFFF"/>

  <!-- Borde exterior -->
  <rect x="20" y="20" width="760" height="1010" rx="4" fill="none" stroke="#1B4F72" stroke-width="2"/>

  <!-- Encabezado principal -->
  <rect x="20" y="20" width="760" height="90" fill="#1B4F72"/>
  <text x="400" y="55" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="800" letter-spacing="1">PRUEBA DE ACEPTACIÓN DE USUARIO</text>
  <text x="400" y="80" text-anchor="middle" fill="#AED6F1" font-size="13" font-weight="600">User Acceptance Testing — UAT</text>
  <text x="400" y="98" text-anchor="middle" fill="#D6EAF8" font-size="11">Clínica Trinidad &amp; Especialidades Médicas S.A.C.</text>

  <!-- Código y versión -->
  <text x="40" y="140" fill="#1B4F72" font-size="11" font-weight="600">Código: UAT-FR-001</text>
  <text x="600" y="140" fill="#1B4F72" font-size="11" font-weight="600">Versión: 1.0</text>
  <line x1="40" y1="148" x2="760" y2="148" stroke="#D5D8DC" stroke-width="1"/>

  <!-- SECCIÓN 1: DATOS GENERALES -->
  <rect x="40" y="160" width="720" height="130" rx="3" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>
  <rect x="40" y="160" width="200" height="26" rx="3" fill="#2E86C1"/>
  <text x="140" y="177" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">1. DATOS GENERALES</text>

  <text x="55" y="205" fill="#333" font-size="11" font-weight="600">Requerimiento:</text>
  <text x="55" y="225" fill="#333" font-size="11" font-weight="600">Módulo:</text>
  <text x="55" y="245" fill="#333" font-size="11" font-weight="600">Fecha de Prueba:</text>
  <text x="55" y="265" fill="#333" font-size="11" font-weight="600">Versión del Sistema:</text>

  <line x1="150" y1="198" x2="450" y2="198" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="218" x2="450" y2="218" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="238" x2="450" y2="238" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="258" x2="450" y2="258" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="500" y="205" fill="#333" font-size="11" font-weight="600">Prioridad:</text>
  <text x="500" y="225" fill="#333" font-size="11" font-weight="600">Ambiente:</text>
  <text x="500" y="245" fill="#333" font-size="11" font-weight="600">N° de Caso:</text>

  <line x1="580" y1="198" x2="740" y2="198" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="218" x2="740" y2="218" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="580" y1="238" x2="740" y2="238" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- SECCIÓN 2: USUARIO VALIDADOR -->
  <rect x="40" y="305" width="720" height="100" rx="3" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>
  <rect x="40" y="305" width="220" height="26" rx="3" fill="#2E86C1"/>
  <text x="150" y="322" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">2. USUARIO VALIDADOR</text>

  <text x="55" y="350" fill="#333" font-size="11" font-weight="600">Nombre Completo:</text>
  <line x1="170" y1="343" x2="450" y2="343" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="500" y="350" fill="#333" font-size="11" font-weight="600">Cargo / Rol:</text>
  <line x1="580" y1="343" x2="740" y2="343" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="55" y="375" fill="#333" font-size="11" font-weight="600">Área / Departamento:</text>
  <line x1="190" y1="368" x2="450" y2="368" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="500" y="375" fill="#333" font-size="11" font-weight="600">Fecha de Validación:</text>
  <line x1="620" y1="368" x2="740" y2="368" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="55" y="395" fill="#333" font-size="11" font-weight="600">Correo Electrónico:</text>
  <line x1="180" y1="390" x2="450" y2="390" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- SECCIÓN 3: PROCEDIMIENTO DE PRUEBA -->
  <rect x="40" y="420" width="720" height="200" rx="3" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>
  <rect x="40" y="420" width="240" height="26" rx="3" fill="#2E86C1"/>
  <text x="160" y="437" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">3. PROCEDIMIENTO DE PRUEBA</text>

  <text x="55" y="462" fill="#1B4F72" font-size="11" font-weight="700">Pasos a ejecutar:</text>

  <rect x="55" y="472" width="14" height="14" rx="2" fill="none" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="75" y="483" fill="#333" font-size="11">Iniciar sesión en el sistema con credenciales de Recepcionista</text>

  <rect x="55" y="494" width="14" height="14" rx="2" fill="none" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="75" y="505" fill="#333" font-size="11">Seleccionar módulo "Agendar Nueva Cita"</text>

  <rect x="55" y="516" width="14" height="14" rx="2" fill="none" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="75" y="527" fill="#333" font-size="11">Buscar y seleccionar un paciente</text>

  <rect x="55" y="538" width="14" height="14" rx="2" fill="none" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="75" y="549" fill="#333" font-size="11">Elegir especialidad y médico disponible</text>

  <rect x="55" y="560" width="14" height="14" rx="2" fill="none" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="75" y="571" fill="#333" font-size="11">Seleccionar fecha y hora disponible</text>

  <rect x="55" y="582" width="14" height="14" rx="2" fill="none" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="75" y="593" fill="#333" font-size="11">Confirmar la cita y verificar que aparezca en el listado</text>

  <!-- SECCIÓN 4: CRITERIOS DE ACEPTACIÓN -->
  <rect x="40" y="635" width="720" height="120" rx="3" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>
  <rect x="40" y="635" width="240" height="26" rx="3" fill="#2E86C1"/>
  <text x="160" y="652" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">4. CRITERIOS DE ACEPTACIÓN</text>

  <text x="55" y="680" fill="#1B4F72" font-size="11" font-weight="700">Criterio</text>
  <text x="400" y="680" fill="#1B4F72" font-size="11" font-weight="700">Cumple</text>
  <line x1="40" y1="686" x2="760" y2="686" stroke="#D5D8DC" stroke-width="1"/>

  <text x="55" y="705" fill="#333" font-size="11">El sistema permite seleccionar un paciente existente</text>
  <text x="430" y="705" fill="#27AE60" font-size="13" font-weight="700">✔ Sí</text>

  <text x="55" y="725" fill="#333" font-size="11">El sistema filtra médicos por especialidad seleccionada</text>
  <text x="430" y="725" fill="#27AE60" font-size="13" font-weight="700">✔ Sí</text>

  <text x="55" y="745" fill="#333" font-size="11">El sistema valida que el horario esté disponible</text>
  <text x="430" y="745" fill="#27AE60" font-size="13" font-weight="700">✔ Sí</text>

  <!-- SECCIÓN 5: RESULTADOS -->
  <rect x="40" y="770" width="720" height="100" rx="3" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>
  <rect x="40" y="770" width="200" height="26" rx="3" fill="#2E86C1"/>
  <text x="140" y="787" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">5. RESULTADO</text>

  <rect x="80" y="810" width="160" height="36" rx="4" fill="#27AE60"/>
  <text x="160" y="833" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">APROBADO</text>

  <rect x="260" y="810" width="160" height="36" rx="4" fill="#E74C3C"/>
  <text x="340" y="833" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">RECHAZADO</text>

  <text x="470" y="828" fill="#333" font-size="11" font-weight="600">Observaciones:</text>
  <line x1="565" y1="822" x2="740" y2="822" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="565" y1="838" x2="740" y2="838" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- SECCIÓN 6: FIRMAS -->
  <rect x="40" y="885" width="720" height="120" rx="3" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>
  <rect x="40" y="885" width="160" height="26" rx="3" fill="#2E86C1"/>
  <text x="120" y="902" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">6. FIRMAS</text>

  <text x="80" y="935" fill="#333" font-size="11" font-weight="600">Usuario Validador</text>
  <line x1="80" y1="958" x2="340" y2="958" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="80" y="973" fill="#888" font-size="10">Nombre y Firma</text>

  <text x="460" y="935" fill="#333" font-size="11" font-weight="600">Analista / Responsable</text>
  <line x1="460" y1="958" x2="720" y2="958" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="460" y="973" fill="#888" font-size="10">Nombre y Firma</text>

  <text x="80" y="995" fill="#888" font-size="9">Este documento certifica que el software cumple con los requerimientos establecidos para el módulo evaluado.</text>
</svg>